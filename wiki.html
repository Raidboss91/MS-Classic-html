<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSCW Wiki — MapleStory Classic World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --maple-orange: #FF6600;
      --maple-orange-dim: #CC5200;
      --maple-gold: #FFD060;
      --maple-gold-dim: #B89030;
      --maple-red: #CC2200;
      --bg-void: #05050a;
      --bg-deep: #0a0a12;
      --bg-card: #10101c;
      --bg-card-hover: #16162a;
      --bg-section: #0d0d1a;
      --border-orange: rgba(255, 102, 0, 0.25);
      --border-gold: rgba(255, 208, 96, 0.2);
      --text-primary: #f0e8d8;
      --text-secondary: #b8a890;
      --text-dim: #7a6a58;
      --green: #00ff88;
      --cyan: #00ccff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Crimson Text', Georgia, serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Author Banner */
    .author-banner {
      text-align: center;
      padding: 0.4rem 1rem;
      background: linear-gradient(90deg, transparent 0%, rgba(80,0,120,0.18) 20%, rgba(120,0,180,0.22) 50%, rgba(80,0,120,0.18) 80%, transparent 100%);
      border-bottom: 1px solid rgba(160,50,255,0.2);
    }
    .author-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #8822cc, #bb44ff, #dd88ff, #bb44ff, #8822cc);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmerPurple 3s linear infinite;
      filter: drop-shadow(0 0 6px rgba(180,80,255,0.7));
    }
    @keyframes shimmerPurple {
      0%   { background-position: 0% center; }
      100% { background-position: 300% center; }
    }

    /* Header */
    .wiki-header {
      text-align: center;
      padding: 2rem 1rem 1.2rem;
      border-bottom: 1px solid var(--border-orange);
      background: linear-gradient(180deg, rgba(255,102,0,0.06) 0%, transparent 100%);
    }
    .wiki-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--maple-orange);
      text-shadow: 0 0 20px rgba(255,102,0,0.4);
      margin-bottom: 0.3rem;
    }
    .wiki-header .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .back-link {
      display: inline-block;
      margin-top: 0.6rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: var(--maple-gold);
      text-decoration: none;
      border: 1px solid var(--border-gold);
      padding: 0.3rem 1rem;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .back-link:hover {
      background: rgba(255,208,96,0.1);
      color: var(--maple-gold);
      border-color: var(--maple-gold);
    }

    /* Container */
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    /* Tag Bar */
    .tag-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      justify-content: center;
    }
    .tag-pill {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      padding: 0.4rem 1.1rem;
      border-radius: 20px;
      border: 1px solid rgba(255,102,0,0.3);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .tag-pill:hover {
      border-color: var(--maple-orange);
      color: var(--text-primary);
      background: rgba(255,102,0,0.08);
    }
    .tag-pill.active {
      background: var(--maple-orange);
      color: #fff;
      border-color: var(--maple-orange);
      box-shadow: 0 0 12px rgba(255,102,0,0.35);
    }

    /* Table Wrapper */
    .table-section {
      background: rgba(17,24,39,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .table-section-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--maple-gold);
      padding: 0.8rem 1.2rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      letter-spacing: 0.05em;
    }
    .table-wrap {
      overflow-x: auto;
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead th {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--maple-gold);
      background: rgba(255,208,96,0.06);
      padding: 0.6rem 0.7rem;
      text-align: left;
      white-space: nowrap;
      border-bottom: 1px solid rgba(255,208,96,0.15);
      position: sticky;
      top: 0;
    }
    tbody td {
      padding: 0.45rem 0.7rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-primary);
      vertical-align: middle;
    }
    tbody tr:hover {
      background: rgba(255,255,255,0.03);
    }
    tbody tr.boss-row {
      background: rgba(255,208,96,0.06);
    }
    tbody tr.boss-row:hover {
      background: rgba(255,208,96,0.1);
    }
    tbody tr.new-row {
      background: rgba(0,255,136,0.05);
    }
    tbody tr.new-row:hover {
      background: rgba(0,255,136,0.09);
    }
    .num { text-align: right; font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; }
    .truncate {
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .truncate-lg {
      max-width: 320px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mob-thumb { height: 28px; image-rendering: pixelated; vertical-align: middle; }

    /* Tier colors */
    .tier-lesser { color: var(--green); }
    .tier-intermediate { color: var(--cyan); }
    .tier-greater { color: #ff9933; }
    .tier-chaos { color: #ff3333; }

    /* Badges */
    .badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      display: inline-block;
      margin-right: 0.2rem;
    }
    .badge-daily { background: rgba(0,204,255,0.15); color: var(--cyan); border: 1px solid rgba(0,204,255,0.3); }
    .badge-weekly { background: rgba(180,80,255,0.15); color: #bb66ff; border: 1px solid rgba(180,80,255,0.3); }
    .badge-repeat { background: rgba(0,255,136,0.12); color: var(--green); border: 1px solid rgba(0,255,136,0.25); }
    .badge-sale { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
    .badge-boss { background: rgba(255,208,96,0.15); color: var(--maple-gold); border: 1px solid rgba(255,208,96,0.3); }
    .badge-new { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      padding: 0.7rem 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-wrap: wrap;
    }
    .pagination .info {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-right: auto;
    }
    .pagination button {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text-secondary);
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 28px;
    }
    .pagination button:hover:not(:disabled) {
      border-color: var(--maple-orange);
      color: var(--maple-orange);
      background: rgba(255,102,0,0.08);
    }
    .pagination button.active-page {
      background: var(--maple-orange);
      color: #fff;
      border-color: var(--maple-orange);
    }
    .pagination button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .wiki-header h1 { font-size: 1.4rem; }
      table { font-size: 0.78rem; }
      .container { padding: 1rem 0.5rem 2rem; }
    }
  </style>
</head>

  npcs: [{"id":1,"name":"Heena","functions":"Beautiful day today!; Press left Alt key and  you'll be able to jump.; Press the arrow keys to move around here and there."},{"id":2,"name":"Sera","functions":"It's a neverending pile of laundry I'll be hanging around here.; Have you met my sister Heena before; Just press the up arrow, and you can climb the ladder or rope."},{"id":3,"name":"Roger","functions":"Open your item inventory and you'll find equip., use, set-up, etc. and cash tabs.; The item you pick up is automatically stored in an appropriate item category. What do you think? Isn't it cool; Double-click on an item in the item inventory and you'll be able to use it."},{"id":4,"name":"Nina","functions":"What would be good for dinner"},{"id":5,"name":"Sen","functions":"I'm... so ... hungry!; Can... I... eat this ..."},{"id":6,"name":"Peter","functions":"You should train yourself well before going on the journey.; Well done getting here!; This is the exit to the Mushroom Town."},{"id":7,"name":"Todd","functions":"Watch out for the monsters; You can attack the monsters, if you press \"Ctrl\".; You can pick up the items, if you press \"z\"."},{"id":8,"name":"Robin","functions":"Be careful! You'll see monsters around here.; Press 'Ctrl' to attack the monster.; Press Z and you'll be able to pick up the item the monster drops."},{"id":9,"name":"Sam","functions":"You can be even stronger, if you get a lesson from Mai.; Go to the right and then you can meet bunch of other people.; Press \"w\" to see the current position."},{"id":10,"name":"Maria","functions":"Ahh...I need to get this letter sent..."},{"id":11,"name":"Mai","functions":"Do you know me by any chance? You don't? What's wrong with you; If you are thinking of challenging me, I suggest you keep dreaming...; Is there anyone that can satisfy my desire to fight..."},{"id":12,"name":"Biggs","functions":"Hmm...looks like I'm still the best looking man in this town.; Hey you! What are you looking at! If you're admiring at my good looks, might as well say it!!; One of these days, I'll be the one operating that huge ship, and take off to a far bigger land..."},{"id":13,"name":"Yoona","functions":"Whoa, what are you looking at?!?!"},{"id":14,"name":"Bari","functions":"Working hard there~"},{"id":15,"name":"Shanks","functions":"I am the captain, dang it!! Don't be looking down on me!; I'll take you anywhere you want"},{"id":16,"name":"Pan","functions":"Let's see...I'm ready to make some money...; Hello everyone! I've got some goods here for sale!!; Anyone that steals will not go unpunished!!"},{"id":17,"name":"Lucas","functions":"Stranger...what are you doing here; I'm not too fond of the strangers. I'm only worried about the peace of this town.; You...if you're strong and powerful, can you take care of the monsters around town"},{"id":18,"name":"Pio","functions":"Do you need my help by any chance? I can handle machinery really well...; I just ate a little bit ago...and yet I'm hungry already...!!; Phew...work is hard. I need to take a break."},{"id":19,"name":"Rain","functions":"Isn't it nice out here today; To jump, press the left Alt key.; Press the arrow keys to move around here and there."},{"id":20,"name":"Sid","functions":"On sale! Really CHEAP!; Welcome!! Hahahaha!"},{"id":21,"name":"Lucy","functions":"Ok, cheap goods! Really cheap!!; Hey you!! Don't even think about stealing in here...; You definitely need potions to travel"},{"id":100,"name":"John","functions":"How about buying one of these fishes; I used to be an adventurer myself...but now I don't mind living a normal life...; You don't need to be that scared of it. I've walked away from that lifestyle long ago."},{"id":101,"name":"Phil","functions":"Open your item inventory and you'll find equip., use, set-up, and etc. and cash tabs.; The item you pick up is automatically stored in an appropriate item category. What do you think? Isn't  it cool; Double-click on an item in the item inventory and you'll be able to use it"},{"id":102,"name":"Teo","functions":"Hey, have you seen a whale around here? Hmmm... where did it go ...; Haven't been able to shave in months ... now my chin is starting to itch like crazy; The incredible feeling of sailing along the beautiful coast ... that's what life is all about!"},{"id":103,"name":"Jane","functions":"I wanna travel too...; Why does my dad not want me to travel around"},{"id":104,"name":"VIP Cab","functions":""},{"id":105,"name":"Mr. Kim","functions":"You need a place to store your items and mesos? This is just the place for you!; My storage is safe and secure, so no worries!"},{"id":106,"name":"Chef","functions":"Who am I? Well...who AM I; If you have a secret scroll by any chance, would you mind showing that to me"},{"id":107,"name":"Olaf","functions":"Huh? Hey you come here!; Look at me~ Do you want to be strong like me"},{"id":108,"name":"Natasha","functions":"Let's see...I'm ready to start doing some business here...; Welcome everyone! I've got some goods you will definitely be interested in...!; Anyone that steals will feel my wrath!!!"},{"id":109,"name":"Mina","functions":"Low price! Really loooow!; Whoa there, no stealing around here!!!; It's a must that you get some potions if you want to go on a journey."},{"id":110,"name":"Silver","functions":"On Sale!! Crazy Prices!!!; Come check it out!! Hahahahah!"},{"id":111,"name":"Mr. Goldstein","functions":"Hey, there! Is your buddy list full by any chance; If you need to expand your buddy list, how about doing some business with me? Harharhar..."},{"id":112,"name":"Pason","functions":"Do you want to head over to Florina Beach; There's a gorgeous beach called Florina Beach near Victoria Island..."},{"id":200,"name":"Regular Cab","functions":""},{"id":201,"name":"Rina","functions":"Have you met up with Athena Pierce, the one that watches over and takes care of our town; If you want to become a bowman, please go see Athena Pierce, who resides in the inner part of the park.; Hmm...is Ronnie doing well? I can't find him...I was thinking of fixing him a nice plate of Unagi."},{"id":202,"name":"Chief Stan","functions":"Where did my son go...; Hey, you! I strongly suggest you don't do anything stupid around this town..."},{"id":203,"name":"Mrs. Ming Ming","functions":""},{"id":204,"name":"Camila","functions":""},{"id":205,"name":"Jay","functions":""},{"id":206,"name":"Bruce","functions":""},{"id":207,"name":"Maya","functions":"Cough, cough..."},{"id":208,"name":"Vicious","functions":"You need something"},{"id":209,"name":"Doofus","functions":"Pet food for your precious pet!! On Sale!!; Do you need to get some food for your pet"},{"id":210,"name":"Karl","functions":"Really cheap around here!!!; Come check it out! Ahahahah!!"},{"id":211,"name":"Sam","functions":"Hmm...I'm ready for business now...; Ahem, I only deal with the finest of all items..."},{"id":212,"name":"Luna","functions":"Yawn, I'm tired... just go choose an item you want ..."},{"id":213,"name":"Denma the Owner","functions":"Do you want to have plastic surgery? Let me take care of you then...; It's not a bad idea to change your face up every once in a while"},{"id":214,"name":"Dr. Feeble","functions":"I've been wearing these for so long, I can barely see what's in front of me now...; Ah ... you want a plastic surgery? Cough cough ...; Plastic surgery ... allow me to handle it ... haha ... by the way, where is the face ... ?"},{"id":215,"name":"Natalie","functions":"You like my hairstyle? We hairdressers are supposed to keep up with the latest trends, you know; Are you tired of your hairdo? Here, let me make it look nice and pretty for you..."},{"id":216,"name":"Brittany","functions":"I'm Brittany the assistant, in charge of dying hair...; Natalie is my mother and the owner of this place."},{"id":217,"name":"Ms. Tan","functions":"These days, everyone wants to tan their skin...; There's nothing as healthy-looking as a well-tanned skin. What do you think? Do you want to tan it like me; Every once in a while, someone comes along that wants a clean, white skin. That's ok, too."},{"id":218,"name":"Pia","functions":"I wanna do something...; Ahhhh...it's trying to eat me!!; Ahh...I like it...sooo comfortable..."},{"id":219,"name":"Cloy","functions":"Do you have any questions about pets? Ask me anything about them...; Are you raising a pet? If you have any questions, feel free to ask"},{"id":220,"name":"Mr. Lee","functions":"You need a place to store your items and mesos? This is just the place for you!; My storage is safe and secure, so no worries!"},{"id":221,"name":"Athena Pierce","functions":"Do you want to become a bowman"},{"id":222,"name":"Trainer Bartos","functions":"What? Your pet turned into a doll? Of course... it's originally a doll that came to life through a special magic.; Hehehe ... if you need to train your pet, I'll take care of it..."},{"id":223,"name":"Trainer Frod","functions":"Hmmm ... my brother keeps making me do these dumb assignments ...; Taking a walk around town with your pet...isn't that the best feeling in the world??"},{"id":224,"name":"Anne","functions":"When's Mom coming? She must be busy...; I can only do this by myself for so long..."},{"id":225,"name":"Utah","functions":""},{"id":226,"name":"Luke","functions":"zzz...; ... ... ... zzz...; This is the way to the ... dun ... geon ... zzzzzzzz ...."},{"id":227,"name":"Bowman Job Instructor","functions":"Do you want to make the 2nd job advancement as the bowman? Go see \"Athena Pierce\" of Henesys first.; Only the ones that pass my test can make the 2nd job advancement as the bowman."},{"id":228,"name":"Casey","functions":"You tired of hunting? How about playing a minigame; Still no one to beat me...I'm the master of minigames..."},{"id":300,"name":"Estelle","functions":"It's not easy to make a new sauce.; No, this is not it! I need a distinctive flavor."},{"id":301,"name":"Regular Cab","functions":""},{"id":302,"name":"VIP Cab","functions":""},{"id":303,"name":"Francois","functions":"Do ,"description":"You hear that Todd can teach you how to hunt...\nTodd asks you to attack and defeat Tutorial Jr. Sentinels, then talk to Peter.\nYou defeated the monsters, just as Todd instructed.","rewards_exp":10,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Maple Island","name":"Sam's Suggestion","level_min":1,"npc_name":"Sam","description":"Sam has some advice for beginner adventurers...\nWhen you talk to Sam, he tells you to head to the east and hunt 10 Snail before meeting Mai.\nAs Sam suggested, you hunted 10 Snails, then met Mai. Is this person a master? They definitely give off a strong, powerful vibe.","rewards_exp":30,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Maple Island","name":"Letter for Lucas","level_min":2,"npc_name":"Maria","description":"Maria needs someone to help her...\nMaria needs someone to help her. She wants you to deliver a letter to Lucas inAmherst.\nYou delivered Maria's Letter to Lucas in Amherst.","rewards_exp":0,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Maple Island","name":"Lucas' Reply","level_min":0,"npc_name":"Lucas","description":"You delivered Maria's Letter to Lucas who was in Amherst. He wrote her a reply, which you should bring to Maria.\nMaria looked relieved after reading the reply from Lucas. Now you want to read it, too. Wonder what this was all about...","rewards_exp":50,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Maple Island","name":"Mai's Training","level_min":3,"npc_name":"Mai","description":"Mai at A Split Road seems like a martial arts specialist who can train beginners.\nYou're under the tutelage of the famous swordmaster, Mai, in A Split Road. She wants you to hunt Blue Snails, Shrooms, and Red Snails. Ah, Mai also said to meet with Biggs in Southperry to get another quest.\nMai trained you, and you feel stronger.","rewards_exp":70,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Maple Island","name":"Mai's Final Training","level_min":0,"npc_name":"Mai","description":"Mai\u2019s training is just about defeating monsters, but it seems really useful for learning how to hunt. Let\u2019s continue with Mai\u2019s training.\nMai believes that while knowing your abilities is important, defeating stronger monsters is also great training to improve them. They asked you to defeat Orange Mushroom.\nOrange Mushroom...? It sounds really strong. Do you think you can defeat it\nAfter Mai's training, you feel much, much stronger. Time to get off Maple Island! Go to Southperry and take the boat to Victoria Island.","rewards_exp":100,"rewards_money":150,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Maple Island","name":"Biggs's Collection of Items","level_min":3,"npc_name":"Biggs","description":"Biggs in Southperry has a task for you.\nYou meet Biggs in Southperry. He wants you to get him 1 Orange Mushroom Cap and 10 Blue Snail Shells. He doesn't look too convinced that you can do it, but it sounds like a piece of cake.\nYou gathered 1 Orange Mushroom Cap and 10 Blue Snail Shells for Biggs in Southperry. The weapon he gave you as a reward was pretty decent.","rewards_exp":70,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Maple Island","name":"Pio's Collecting Recycled Goods","level_min":5,"npc_name":"Pio","description":"Pio in Amherst wants you to help collect recycled goods.\nYou ran into Pio, who is famous in Amherst for fixing broken goods. He asks you to break down scrap boxes from around town and bring back Rusty Screws and Old Wooden Boards.\nYou broke the boxes and collected supplies for Pio. It was fun because you found other useful items in the boxes as well.","rewards_exp":100,"rewards_money":150,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Maple Island","name":"Rain's Maple Quiz 1","level_min":5,"npc_name":"Rain","description":"You're not a beginner anymore. Talk to Rain in Amherst and take the Maple Quiz!\nYou're not a beginner anymore. Talk to Rain and take the Maple Quiz!\nRain's first question was about how to hang from a ladder or rope. Alright! up arrow key, make sure to remember it well.","rewards_exp":20,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Maple Island","name":"Rain's Maple Quiz 2","level_min":5,"npc_name":"Rain","description":"Solve Rain's second question.\nWhat's Rain's second question\nRain's question was about equippable items, which can be worn by double-clicking on them.","rewards_exp":25,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Maple Island","name":"Rain's Maple Quiz 3","level_min":5,"npc_name":"Rain","description":"Rain's third question.\nTime for Rain's thirds question.\nIn the Equipment Window, I can check the items I'm wearing, and I can also double-click to unequip them.","rewards_exp":30,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Maple Island","name":"Rain's Maple Quiz 4","level_min":5,"npc_name":"Rain","description":"Time to answer Rain's fourth question.\nYou can answer Rain's questions if you think carefully.\nRain's fourth quiz was about ways to recover HP. I didn't know there were so many different methods! When I find a chair or bench, make sure to sit down.","rewards_exp":35,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Maple Island","name":"Rain's Maple Quiz 5","level_min":5,"npc_name":"Rain","description":"Rain's fifth question. Wonder what it's about.\nWhat's the fifth question\nRain asked about job advancements. Warriors, Thieves, Bowmen, and Magicians all need to be at least level 10 to advance.","rewards_exp":40,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Maple Island","name":"Rain's Maple Quiz 6","level_min":5,"npc_name":"Rain","description":"Time to answer Rain's question.\nFinally, the sixth question.\nI learned that when I level up, I get AP. If I use the AP on the stats I want, I can increase them, so I\u2019ll make sure to remember that.","rewards_exp":45,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Maple Island","name":"Rain's Maple Quiz 7","level_min":5,"npc_name":"Rain","description":"This is Rain's last question. Excited\nFinally the last question. After this, you'll no longer be a beginner.\nRain advised that it's time to leave Maple Island. In Victoria Island, you can choose a job and start a lot of new adventures. Head to Southperryto get to Victoria Island!","rewards_exp":50,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Victoria Island","name":"Olaf's First Training","level_min":8,"npc_name":"Olaf","description":"It seems like Olaf in Lith Harbor has something to say to the beginner adventurers who have just arrived on Victoria Island.\nI met Olaf at Lith Harbor. Olaf mentioned that once I reach level 10, I could advance my job, but wondered if I truly had what it takes. To prove myself, Olaf gave me a task to hunt monsters outside the village. I\u2019m feeling a bit nervous since there seem to be stronger monsters on Victoria Island...\nI successfully passed Olaf's training. But is this really enough","rewards_exp":84,"rewards_money":234,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Victoria Island","name":"Phil\u2019s Call","level_min":10,"npc_name":"Phil","description":"I\u2019ve finally reached level 10! Come to think of it, I remember hearing something about choosing a job once I hit level 10\u2026\nLet\u2019s head to the Information Broker Phil in Lith Harbor to learn more about job advancement.\nI learned from Phil that I can choose to become a Swordman, Magician, Archer, or Rogue. It seems like I can\u2019t change it once I choose, so I need to think carefully\u2026","rewards_exp":171,"rewards_money":204,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Victoria Island","name":"Jane and the Mushroom","level_min":20,"npc_name":"Jane","description":"Look for Jane in Lith Harbor.\nIn Lith Harbor, I met Jane, a girl wearing bunny ears. Jane says she wants to travel the world, but her dad won't let her. She thinks if I get her 15 Blue Mushroom Caps and 15 Horny Mushroom Caps, her father will change his mind.\nI delivered the Horny Mushroom Caps and Wild Boar Tooths to Jane. I wonder if this will really change her father's mind... she's wearing bunny ears, for goodness sake! Ah well, it's none of my business. In return, Jane gave me a Scroll for ATT. My weapon's going to be awesome... if the scroll works.","rewards_exp":2021,"rewards_money":585,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Victoria Island","name":"Jane's First Challenge","level_min":44,"npc_name":"Jane","description":"I hear Jane's got herself a new life ambition...\nLast time, I got Jane some mushroom caps and boar's teeth to convince her dad to let her travel. That didn't work. Now she has a new dream: she wants to be an alchemist! A bit fickle, but whatever. Now, she needs materials... I can guess where this is going. She wants me to collect 1 Pure Water, 25 Drake Skull, and 25 Medicine With Weird Vibes by defeating several monsters so she can make some Elixirs.\nI got the materials Jane needed to make some Elixirs. If she fails... is the whole place going to blow up","rewards_exp":6300,"rewards_money":1287,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Victoria Island","name":"Jane's Second Challenge","level_min":44,"npc_name":"Jane","description":"Jane says she will make me something better.\nThis time, Jane promises to make a better item, so she needs me to gather 1 Mushmom Spore, 3 vials of Drake's Blood, 25 Medicine With Weird Vibes, and 25 Malady's Experimental Frogs by defeating several monsters. She says it can be used to make an even more powerful elixir\u2026\nI got Jane the materials she needed. If she does well, I'll get some nice elixirs. If not... er, I'm not sure I really want to take what she gives me...","rewards_exp":6300,"rewards_money":1287,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Victoria Island","name":"Jane's Final Challenge","level_min":44,"npc_name":"Jane","description":"Jane says she will make me something better.\nFor this last experiment, Jane promises to make me a mysterious Scroll. For that, she needs a Moon Rock, 20 Dragon Skins, and 10 Sap of Ancient Tree. Maybe I should ask the fairies at Ellinia for the Moon Rock...\nI got the materials Jane needed and the scroll for gloves was made without a hitch. Sweet! Jane expressed a strong desire to keep experimenting. Maybe next time I return I'll be able to buy something from her that's not sold in stores...","rewards_exp":6300,"rewards_money":1287,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Victoria Island","name":"[Deep Forest of Patience] John's Pink Flower Basket","level_min":45,"npc_name":"John","description":"Let's go meet John in Lith Harbor.\nI met a fisherman named John in Lith Harbor. He wanted to get his wife a nice flower basket for their upcoming anniversary. He asked me if I could get him 10 Pink Violas for her. According to him, a Mysterious Statue can lead me to where the flower is. Sleepywood... Sleepywood??? That's FAR!!!\nI got John all 10 Pink Violas. With these, he can make a beautiful flower basket for his wife on their anniversary. As a sign of appreciation, John got me a whole bunch of screws left over from parts of a ship. By the way, if there are this many screws that have fallen out of that ship, then how in the world is it even working...? Is it still carrying passengers???","rewards_exp":6581,"rewards_money":1316,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Victoria Island","name":"[Deep Forest of Patience] John's Present","level_min":45,"npc_name":"John","description":"Let's go see John in Lith Harbor again.\nI ran into John the fisherman again in Lith Harbor. This time, he wanted to get his wife Blue Violas for her birthday. He asked me to get 20 Blue Violas for him. The scent of Blue Viola last over 500 years... and according to John, they can be found in the Mysterious Statue again, where the flower may be found. Man... do I HAVE to go in there again??\nI got John all 20 Blue Violas. They have a nice scent, but 20 of them? Makes my head spin... As a sign of appreciation, John gave me a nice glove he found inside the ship. I mean, it looks like someone accidentally left that glove in there... is he allowed to give it to me like that? What if I wear this around town and run into its actual owner??","rewards_exp":6581,"rewards_money":1316,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Victoria Island","name":"[Deep Forest of Patience] John's Last Present","level_min":45,"npc_name":"John","description":"I heard John has one final thing to ask me...\nI ran into John the fisherman again in Lith Harbor. This time, he told me his mother passed away recently, and he wanted to get some White Violas for her. He asked me to get 30 White Violas for him. The scent of White Violas last over 1000 years... and according to John, they can be found through the Mysterious Statue again, where the flowers may be found. Man... do I HAVE to go in there again??\nI got John all 30 White Violas. They have a nice scent, but 30 of them? Makes my head spin... As a sign of appreciation, John gave me a set of his mother's earrings. These earrings look like they are made of some common flowers, but it seems there's something to it...","rewards_exp":6581,"rewards_money":1316,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Victoria Island","name":"Olaf's Second Training","level_min":8,"npc_name":"Olaf","description":"It looks like Olaf in Lith Harbor has prepared another round of training.\nI met Olaf again in Lith Harbor. He says my training is still far from over and gave me a mission to hunt stronger monsters outside the town. Will I finally become a true adventurer once I finish this training\nI passed Olaf's second training with flying colors! Once I reach Level 10, I'll be all set to choose my job!","rewards_exp":84,"rewards_money":234,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Victoria Island","name":"Teo's Weird Hobby","level_min":8,"npc_name":"Teo","description":"It seems a sailor named Teo in Lith Harbor is looking for an adventurer to lend a hand.\nTeo in Lith Harbor says his hobby is collecting weird things. He asked me to hunt Slimes near the town and bring back 1 Slime Bubble. He warned me that it might be hard to find!\nI delivered 1 Slime Bubble to Teo in Lith Harbor. But from the look on his face, he\u2019s already craving something else...","rewards_exp":84,"rewards_money":234,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Victoria Island","name":"Teo's Even Weirder Hobby","level_min":8,"npc_name":"Teo","description":"It seems like Teo in Lith Harbor still has more weird stuff he wants to collect.\nTeo from Lith Harbor is asking for even weirder items to complete his collection. He says he absolutely needs an intact Pig's Head... Why is he even collecting this kind of stuff\nI delivered a Pig's Head to Teo in Lith Harbor. I guess I should keep his weird hobby a secret between us.","rewards_exp":84,"rewards_money":234,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Mrs. Ming Ming's First Worry","level_min":15,"npc_name":"Mrs. Ming Ming","description":"I hear that Mrs. Ming Ming in Henesys is worried about something...\nI ran into Mrs. Ming Ming in Henesys, who is overcome with concern. She says there aren't enough decorations for the village festival, and asks you to get 10 Slime Bubbles and 20 Pig's Ribbons.\nI brought back all the stuff Mrs. Ming Ming asked me for, but I'm sure these decorations are not the only things needed for the festival...","rewards_exp":705,"rewards_money":438,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Mrs. Ming Ming's Second Worry","level_min":15,"npc_name":"Mrs. Ming Ming","description":"I heard Mrs. Ming Ming in Henesys has a new worry...\nI met Mrs. Ming Ming again in Henesys who was preparing for the village festival. She said she needs food to prepare for the festival, and asked me to collect 10 Pig's Heads, 30 Octopus Legs, and Estelle's Special Sauce. To get the special sauce, I think I'll have to go find Estelle in The Field South of Ellinia.\nI met up with Estelle in The Field South of Ellinia to get her Estelle's Special Sauce, but she apparently she doesn't want to give it to me for free...","rewards_exp":705,"rewards_money":438,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Estelle's Request","level_min":15,"npc_name":"Estelle","description":"Estelle in The Hill East of Henesys wants Garnet in exchange for Special Sauce. She wants to buy a necklace for her mom's birthday.\nI got 1 Garnet for Estelle, who I met near The Hill East of Henesys, for making her mother's birthday present. She gave me Estelle's Special Sauce. I better collect the other materials and return to Mrs. Ming Ming.","rewards_exp":705,"rewards_money":438,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Estelle's Special Sauce","level_min":15,"npc_name":"Estelle","description":"I received the special sauce from Estelle in The Field South of Ellinia. Now, I should deliver it to Mrs. Ming Ming, along with 10 Pig's Heads and 30 Octopus Legs.\nI got all the materials that Mrs. Ming Ming asked me to get, and gave them to her. I can't wait to see the village festival!","rewards_exp":705,"rewards_money":438,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Pia and the Blue Mushroom","level_min":16,"npc_name":"Pia","description":"Find Pia in Henesys Park.\nUnder the watchtower in Henesys Park, you see Pia, wearing a teddy bear costume. How cute! She tells you that she ran into a bully Blue Mushroom on her way to Ellinia, and now she wants you to show the rude mushroom who's boss! Collect 20 Green Mushroom Caps and 20 Blue Mushroom Caps as proof. You contemplate telling Pia she's asking to be teased, walking around the forest in a bear costume, but you decide against it.\nYou delivered 20 Green Mushroom Caps and 20 Blue Mushroom Caps to Pia in Henesys Park. She was thrilled that she got vengeance on the mushrooms and gave you a Scroll for hat. All you have to do is click on it in the Use tab of your Item Inventory and drag it to your helmet in the Equipment window... Oh, and you'll have to cross your fingers and hope the Scroll doesn't fail.","rewards_exp":884,"rewards_money":468,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Camila's Gem","level_min":24,"npc_name":"Camila","description":"I heard that Camila in Henesys is worrying about something...\nI met Camila in Henesys, and given her timid disposition, she asked me to deliver Sparkling Glass Marble to Utah for her. I heard that I can get to Utah's Pig Farm through The Forest East of Henesys...\nI delivered a gift from Camila to Utah. I'm sure they're really close friends, since they give what's most precious to each other. I wish I could meet a friend like that during my journey...","rewards_exp":2531,"rewards_money":702,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Maya of Henesys","level_min":21,"npc_name":"Teo","description":"I heard that Maya in Henesys is very sick...\nA girl named Maya in Henesys Townstreet has been ill for a long time. It looks like she can't live a normal life at all. I agreed to help her. Weird Medicine... What a strange name! She says she'll get a little better by taking that... I should go to Lith Harbor and see this guy Teo...\nMaya wanted me to go see Teo of Lith Harbor, so I did just that. He promised to give me the Weird Medicine only after I get him a Sparkling Rock. Geez, he won't even give any free medicine for a sick girl","rewards_exp":1535,"rewards_money":429,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Finding Sophia","level_min":21,"npc_name":"Sophia","description":"Near the ship The Victoria in Lith Harbor, I met a heavily bearded crewmember named Teo. He does have some Weird Medicine, but says that in order to use it properly, he needs a Sparkling Rock. He promised that if I bring it to him, he\u2019ll gladly hand it over. To obtain the Sparkling Rock, I should head to Perion Department Store and speak with Sophia, the daughter of the inn\u2019s owner.\nI met Sophia. To make the Sparkling Rock, she said she needs Arcon's Blood.","rewards_exp":2193,"rewards_money":614,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Making a Sparkling Rock","level_min":21,"npc_name":"Manji","description":"I met Sophia in Perion Department Store. She's working on her dream of becoming an alchemist. To make the sparkling rock, she says she needs 30 Squishy Liquids, 30 Leafs, 30 Octopus Legs and 1 Arcon's Blood. Everything looks reasonable enough... wait, Arcon's Blood?! Fortunately, Sophia knows where to get some. She says to have a chat with Manji, who's somewhere around Perion.\nSophia told me that Manji has some Arcon's Blood, a key ingredient to make a Sparkling Rock.","rewards_exp":2193,"rewards_money":614,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Arcon's Blood","level_min":21,"npc_name":"Manji","description":"I found Manji in Perion, and as expected, he was unwilling to give me any Arcon's Blood for free. He told me to go to the underground tunnel in the middle of the island, defeat 75 Zombie Mushrooms, and gather up 40 Charm of the Undead first. I practically shivered at how coldly Manji treated me... I almost regret agreeing to help Maya, but no one else seems willing to...\nManji asked me to defeat Zombie Mushrooms and gather Charm of the Undead in return for some Arcon's Blood.","rewards_exp":2193,"rewards_money":614,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Getting Arcon's Blood","level_min":21,"npc_name":"Manji","description":"I gathered up 40 Charm of the Undead from the Ant Tunnel and gave them to Manji of Perion. Still cocky, still arrogant, but following through on his promise, he handed over Arcon's Blood to me. Maybe he isn't so horrible after all. Anyway, now I need to gather up 30 Squishy Liquids, 30 Leafs, 30 Octopus Legs, and the Arcon's Blood for Sophia.\nI brought the Charm of the Undead to Manji and finally got Arcon's Blood. I should hurry back to Sophia...","rewards_exp":2193,"rewards_money":614,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Making Sparkling Rock","level_min":21,"npc_name":"Teo","description":"Sophia looked genuinely surprised when I handed her all the materials needed for the Sparkling Rock. Well, it wasn't easy! Anyway, she hands over a Sparkling Rock made of the materials I gathered. Hmm, the Sparkling Rock...gives off a strange light and then... starts glittering, and... whoa, I understand why people want this! It's mesmerizing! Well, now I just have to trade it with Teo in Lith Harbor.\nSophia was startled when she saw Arcon's Blood and made Sparkling Rock for me. Now then, should I go back to Teo in Lith Harbor","rewards_exp":2193,"rewards_money":614,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Delivering the Weird Medicine","level_min":21,"npc_name":"Maya","description":"I gave the Sparkling Rock to Teo in Lith Harbor and received the Weird Medicine in return. Now, all I need to do is get this to Maya, and I'm done, but the more I think about it, the more I regret saying yes. Anyway, this medicine looks quite tasty. If I ever find myself thirsty and without any water, maybe I should just drink it myself. Hahaha...\nI went back to Henesys and handed Maya the weird medicine. Hopefully, she'll get better after taking this. As a sign of thanks, Maya gave me 5,000 mesos and a Brown Bamboo Hat. This hat... I mean, it looks like it's going to help when I'm walking under a blazing sun, but it looks so old and raggedy... and if I put it on, it makes this weird noise, and it feels like insects are moving around inside it... am I going to be alright...","rewards_exp":2193,"rewards_money":614,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Luke the Security Guy","level_min":19,"npc_name":"Luke","description":"Let's meet Luke the Security Guy at the Henesys Dungeon Entrance.\nAt the dungeon entrance, I met Luke, the guard. He said he wanted to make a nourishing meal for his mother and asked me to hunt 20 Jr. Neckis and 20 Stirges, then bring back 10 Jr. Necki Skins, 10 Stirge Wings, and 1 Salad. He said he\u2019s too busy with his guard duties... but honestly, he just looks like he\u2019s about to fall asleep...?!\nI got Luke, who is protecting the entrance of the Dungeon, the stuff he asked for. Since he's making the \"Snake Drink\" and all... I want a taste of that myself! In return, Luke gave me a nicely refined jewel he found from around the area. It's not like refined jewels fall from the sky... did someone lose it while traveling? Anyway, I should drop by later when the \"Snake Drink\" is ready...","rewards_exp":1668,"rewards_money":555,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Luke the Security Guy's Wish to Travel","level_min":46,"npc_name":"Luke","description":"I hear that Luke the Security Guy made up his mind on something...\nI met Luke at the entrance of the dungeon again. The Snake Drink from back then is gone now because he and his mom drank it all... Anyway, Luke said he\u2019s done with the boring life of a security guard and has decided to go on an adventure. To make a glove fit for the journey, Silas Irons of Perion asked for 1 Black Feather, 10 Orihalcon Ingots, 30 Drake Skulls, 20 Dragon Skins, and 20 Screws! I\u2019m guessing he wants me to gather them for him... Oh, and apparently, the fairies of Ellinia might know something about Black Feather~\nI brought Luke the materials he needed to make the gloves and received the treasured heirloom helmet,\u00a0Bronze Crusader Helm, in return. It feels like I got the short end of the deal... but since it\u2019s a family heirloom passed down for generations, I can\u2019t really complain...","rewards_exp":6462,"rewards_money":1345,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Maya's First Collection","level_min":30,"npc_name":"Maya","description":"Go see Maya in Henesys.\nI got a request from Maya of Henesys, who has been collecting various items. She wanted 20 each of #bOrange Mushroom Cap, Green Mushroom Cap, Blue Mushroom Cap, and Horny Mushroom Cap. Maybe... well it looks like I can get these from the monsters around the prairie...\nI got everything Maya asked for, but when do I get rewarded for this? What? How many more times do I have to do this??","rewards_exp":3150,"rewards_money":877,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Maya's Second Collection","level_min":30,"npc_name":"Maya","description":"This time Maya wanted 20 each of Pig's Ribbon, Bubbling's Huge Bubble, Fire Boar's Tooth, and Tablecloth. Apparently, I can get those by hunting monsters around the plateau, subway station, and prairies... well, that's easy!\nI got everything Maya asked for. Please don't tell me she wanted all these for free...","rewards_exp":3150,"rewards_money":877,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Maya's Third Collection","level_min":47,"npc_name":"Maya","description":"Maya requested 30 each of Iron Hog's Metal Hoof, Lupin Doll, Cold Eye Tail, and Tortie Shell. Apparently, I can get those through monsters in the highland, beach, and prairie. This is getting harder now...\nI got everything Maya asked for. I'm still not getting anything?? How many more times do I have to do this??","rewards_exp":7143,"rewards_money":1374,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Maya's Last Collection","level_min":47,"npc_name":"Maya","description":"Go see Maya in Henesys.\nMaya asked me to gather some items: 1 Diamond, and 50 each of Stone Golem Rubble and Dark Stone Golem Rubble. Apparently, I can get them by defeating monsters at the Golem\u2019s Temple on the way from Henesys to the Dungeon... but this is way too tough!\nI got all the items Maya requested for the last time... or is it? As a sign of appreciation, she gave me a cape her grandma made for Athena Pierce, the chief of this town. It may be really old, but it still looks like it's brand new!","rewards_exp":7143,"rewards_money":1374,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Pia's Present For a Friend","level_min":42,"npc_name":"Pia","description":"Let's go to Pia in Henesys.\nI ran into that same teddy-bear-costume-wearing Pia at the Henesys Park. I did her a favor and took care of the Blue Mushrooms before. This time, she wants to make a claw as a present for a friend in Ellinia who wants to go out on a journey. The claw she wants to make requires 15 Silver Ingots, 30 Dragon Skins, and 30 Screws... If I get her all these... am I going to be richly rewarded\nPia asked me to get a gift for her friend who decided to set out on an adventure, and I brought it back for her. But it seems this alone isn\u2019t enough.","rewards_exp":5793,"rewards_money":1228,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Looking for the Red Cape","level_min":42,"npc_name":"Pia","description":"Let's go to Pia in Henesys.\nPia also asked me to retrieve the Red Cape that Rina in Henesys borrowed for her friend. I\u2019ll probably get something nice if I bring it back to her.\nI went to Rina to get Pia's cape, but Rina told me that she's keeping the cape until Pia brings back what she borrowed from her. She said she will return the cape if she gets back what Pia has borrowed.","rewards_exp":4055,"rewards_money":859,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"What Pia has Borrowed","level_min":42,"npc_name":"Rina","description":"It seems Rina has her own reasons for not returning what she borrowed from Pia.\nI went to see Rina in Henesys, and instead, she tells me she took that red cape because Pia didn't return the items she borrowed from her. She said that she would return the cape if she gets her items back... the items are 1 Black Crystal, 1 Ancient Scroll, and 30 Medicine With Weird Vibes.\nI paid off Pia's debt to Rina on her behalf and received the Red Cape in return. Now I just need to bring this back to Pia, right","rewards_exp":5793,"rewards_money":1228,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Pia\u2019s Gift","level_min":42,"npc_name":"Rina","description":"It looks like Rina is ready to return the Red Cape she borrowed from Pia.\nI got my hands on the Red Cape that Pia asked for. Now I just need to bring it back to her.\nI delivered the materials needed to make the claw to Pia in Henesys Park and received the scroll. I wonder if Pia\u2019s friend has already set out on their adventure by now. Who knows\u2014maybe I\u2019ll even run into them during my travels!","rewards_exp":5793,"rewards_money":1228,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"The Reason Behind the Mushroom Studies","level_min":10,"npc_name":"Bruce","description":"I should go see Bruce in Henesys...\nI got to meet Bruce, who has been studying monsters and animals in Henesys. His bright smile and the easygoing demeanor belies the painful fact that his daughter has been missing for some time, and that he's been studying the mushroom monsters for the sake of finding clues of his daughter's whereabouts. He asks me if I can help him out, and I just can't say no to a worthy cause like this...\nI helped Bruce gather up the materials necessary for his studies. Will these help him find his daughter","rewards_exp":171,"rewards_money":292,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"I Need to Find My Daughter 1","level_min":11,"npc_name":"Bruce","description":"I wonder how Bruce is doing in Henesys these days...\nI met up with Bruce in Henesys, and he had great news: He finally found his daughter!!! There was one problem, however... She seems to be suffering from amnesia. Bruce gave me a toy that his daughter played with while growing up, and asked me to give it to her.\nI found Ayan and gave her Ayan's Toy Sword.","rewards_exp":236,"rewards_money":321,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"I Need to Find My Daughter 2","level_min":11,"npc_name":"Ayan","description":"It seems that Ayan, having regained her memories of the past, is eager to share the news with her father.\nAmazingly, Ayan recovered from her amnesia with the help of Ayan's Toy Sword. That's just amazing! The only thing left now is for Ayan and Bruce to finally meet again. But first, I have to get this letter from Ayan to Bruce.\nI'm so glad that Ayan got her memory back. I'm even gladder that Bruce got to finally see his daughter again! What a moment...","rewards_exp":236,"rewards_money":321,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Arwen and the Glass Shoe","level_min":29,"npc_name":"Arwen the Fairy","description":"Arwen the Fairy from Ellinia has lost something...\nArwen the Fairy from Ellinia says she lost Arwen's Glass Shoes a couple of days ago, on her way to Perion. A monster covered in flame stole it! Fairies obsess over glimmering, shiny objects so she obviously wants it back... Time to hunt some monsters near Perion.\nI returned Arwen's Glass Shoes to Arwen the Fairy in Ellinia. I got lucky, finding it off a nasty Fire Boar. As a sign of gratitude, she gave me a fairy item. It's gorgeous and glimmers like a star. Dang, maybe I can use this to make something special.","rewards_exp":3037,"rewards_money":848,"is_daily":false,"is_weekly":false,"is_repeatable":true},{"region":"Henesys","name":"Collecting 50 Cursed Dolls","level_min":36,"npc_name":"Rowen the Fairy","description":"I think Rowen the Fairy in Ellinia has something to ask me...\nI ran into Rowen the Fairy again, who gave me Fresh Milk for Ronnie, Mr. Wetbottom's son. Back then, she seemed to be keeping her guard up against humans, but now, it looks like she accepts me as Ronnie's friend... Rowen the Fairy is assistant to the head magician of Ellinia, Grendel the Really Old, and she tells me that he is concerned about the Cursed Dolls that he made with his black magic a long, long time ago. The dolls had been sealed up for a while, until a bunch of Lupins took them and ran away. The Lupins have since become zombies and have been destroying the forest. To return the forest to how it was before, someone needs to take down the Zombie Lupins and take the Cursed Dolls away from them... So, I readily accepted the request to collect 50 cursed dolls, but I fear those crazy monkeys may be too much to handle...\nI eliminated a bunch of Zombie Lupins in a forest near Ellinia and collected all 50 Cursed Dolls for Rowen. In return, she gave me 7 ores. I hope the forest will return to normal...","rewards_exp":4387,"rewards_money":1053,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Collecting 70 Cursed Dolls","level_min":36,"npc_name":"Rowen the Fairy","description":"70? Well, that shouldn't be too hard...\nI eliminated a bunch of Zombie Lupins in a forest near Ellinia and collected all 70 Cursed Dolls for Rowen. In return, she gave me 10 ores. I hope the forest will return to normal...","rewards_exp":4387,"rewards_money":1053,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Collecting 100 Cursed Dolls","level_min":36,"npc_name":"Rowen the Fairy","description":"Rowen the Fairy asked for my help again, this time to hunt 100 Zombie Lupins and collect 100 Cursed Dolls. It's getting quite serious now...\nI eliminated a bunch of Zombie Lupins in a forest near Ellinia and collected all 100 Cursed Dolls for Rowen. In return, she gave me 5 very rare ores. I hope the forest will return to normal...","rewards_exp":4387,"rewards_money":1053,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Collecting 150 Cursed Dolls","level_min":36,"npc_name":"Rowen the Fairy","description":"Rowen the Fairy asked for my help again, this time to hunt 150 Zombie Lupins and collect 150 Cursed Dolls. Now that's a lot of Cursed Dolls!\nI eliminated a bunch of Zombie Lupins in a forest near Ellinia and collected all 150 Cursed Dolls for Rowen. In return, she gave me a scroll for gloves. I hope the forest will return to normal...","rewards_exp":4387,"rewards_money":1053,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Collecting 200 Cursed Dolls","level_min":36,"npc_name":"Rowen the Fairy","description":"Rowen the Fairy asked for my help one last time, this time to hunt 200 Zombie Lupins and collect 200 Cursed Dolls. I wonder why she needs so many... Is she trying to sell them or something\nI eliminated a bunch of Zombie Lupins in a forest near Ellinia and collected all 200 Cursed Dolls for Rowen the Fairy. In return, she gave me a nice hat. I've collected so many dolls for her, but it seems like the Zombie Lupins aren't decreasing in any way, shape, or form... I wonder what's going on. However, it seems that the fairies may not have as much animosity toward humans now... at least that's a good thing.","rewards_exp":4387,"rewards_money":1053,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"First Material for Building a New House","level_min":41,"npc_name":"Ronnie","description":"Let's go meet Ronnie in the woods in Ellinia.\nRonnie from the forest of Ellinia asked me a favor of gathering up materials to build a house for the newborn fairies that are to come down the road. By hunting Horny Mushrooms and Curse Eyes, I\u2019ll need to collect 30 Horny Mushroom Caps and 30 Curse Eye Tails... I guess I can get most of these from the monsters scattered around Ellinia...\nI got all the items Ronnie requested, but when do I get rewarded for this? What? How many more times do I have to do this??","rewards_exp":5568,"rewards_money":1199,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Second Material for Building a New House","level_min":41,"npc_name":"Ronnie","description":"Meet Ronnie in the Map#105010000.\nRonnie has now asked me to collect 30 Bubbling's Huge Bubbles and Tablecloths by taking down Bubblings and Jr. Wraiths. I should be able to get them from the monsters living in the Kerning City subway. This should be no problem~\nI got everything for Ronnie. Please don't tell me he wanted all these for free...!","rewards_exp":5568,"rewards_money":1199,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Third Material for Building a New House","level_min":41,"npc_name":"Ronnie","description":"Meet Ronnie in the Map#105010000.\nRonnie has now asked me to hunt Fire Boars and Copper Drakes and collect 30 each of Fire Boar's Tooths and Drake Skulls. I should be able to get them from the monsters around Perion. Things are starting to get a bit tricky\u2026\nI got everything for Ronnie. I'm still not getting anything?? How many more times do I have to do this??","rewards_exp":5568,"rewards_money":1199,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Last Material for Building a New House","level_min":41,"npc_name":"Ronnie","description":"Meet Ronnie in the Map#105010000.\nRonnie asked for the last time. This time he wanted 30 Cold Eye Tails, 10 Dragon Skins, and 1 Diamond by taking down Cold Eyes and Drakes. I can sort of get this, but for me to hunt at the deep parts of the Ant Tunnel\u2026 this is way too hard!!\nI got all the materials Ronnie needed for the last time. Is this it? For the reward, he gave me a scroll for shoes he got as a gift from the fairies, who found it somewhere around the forest. He couldn't figure out how to use the scroll, so I'm getting it... hopefully it works... haha...","rewards_exp":5568,"rewards_money":1199,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"I Need Help on My Homework!","level_min":10,"npc_name":"Wing the Fairy","description":"Whenever I walk past Wing the Fairy in Ellinia, he seems to be asking for help. I wonder why...\nWing the Fairy of Ellinia seems to have a general disdain for humans. Definitely not the kind of attitude I expect from someone in need of help. He asked me if I can get him 10 Leafs, 10 Squishy Liquids, and 3 Slime Bubbles. He needs them so he can make a potion for his homework.\nI helped Wing the Fairy of Ellinia with his homework. I have no idea how that potion works, though.","rewards_exp":171,"rewards_money":292,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"How to Enjoy Mushrooms","level_min":14,"npc_name":"Shane","description":"It looks like Shane in Ellinia is looking for an adventurer to lend a hand.\nShane in Ellinia mentioned wanting to eat a delicious mushroom dish and asked me to find some ingredients. He said Green Mushroom Caps taste especially good, so I should head out and hunt Green Mushrooms near the forest.\nI gave Green Mushroom Caps to Shane in Ellinia. Can he really make a delicious meal out of this","rewards_exp":546,"rewards_money":409,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"How to Enjoy Mushrooms Even More","level_min":14,"npc_name":"Shane","description":"It looks like Shane in Ellinia has another favor to ask.\nShane in Ellinia says he learned an even better way to cook Green Mushroom Caps and asked me to bring some Green Mushroom Caps, as well as a Lemon.\nI delivered the Green Mushroom Caps and Lemon to Shane in Ellinia. It feels like the dish might actually taste better than the last one, doesn't it","rewards_exp":546,"rewards_money":409,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Alex's Request","level_min":18,"npc_name":"Alex","description":"There is a runaway kid named Alex in Kerning City...\nOn a lonely building rooftop in Kerning City, I met a boy named Alex who ran away from home because of a disagreement with his father, Chief Stan in Henesys. But Alex has become exhausted from being on the run with no money. Now he wants to return home and try to work things out with his strict, but loving, father. But he wants me to persuade his father not to punish him when he returns home. He also says he wants me to bring the Old Gold Watch his mother left him when she died as proof that I successfully persuaded his father.\nAs Alex requested, I looked for his father in Henesys to get Alex's mother's Old Gold Watch.","rewards_exp":959,"rewards_money":368,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Talking to Stan","level_min":18,"npc_name":"Chief Stan","description":"At the entrance of Henesys, I meet Alex's father, Chief Stan, the chief of Henesys. Before I can even start a conversation, he asks for 15 Green Mushroom Caps and 15 Blue Mushroom Caps.\nOnly after I brought the Green Mushroom Caps and the Horny Mushroom Caps did Chief Stan start talking to me.","rewards_exp":1371,"rewards_money":526,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Mother's Gold Watch","level_min":18,"npc_name":"Alex","description":"At the entrance of Henesys, I met Alex's father Chief Stan, the chief of Henesys. He was even more blunt and difficult to talk to than I'd anticipated, but I finally convinced him to accept Alex back with open arms. I also got Alex's late mother's Old Gold Watch as proof. Now, all I need to do is get this watch to Alex in Kerning City.\nI gave Alex his late mother's Old Gold Watch. As a sign of appreciation, he gave me an earring he received from friends he met while traveling. Well, Chief Stan forgave Alex, but it doesn't seem like Alex plans to head home right away. Maybe I should keep an eye open next time I'm in Henesys.","rewards_exp":1371,"rewards_money":526,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Don Hwang's Request","level_min":10,"npc_name":"Nella","description":"I hear that Nella at Kerning City is the one to talk to if I'm looking for work...\nI gave Nella 1000 mesos as commission for telling me about various requests from the citizens of Kerning City. The first request is from Don Hwang, the owner of the armor shop, who needs materials to craft new armor. I need to defeat 20 Orange Mushrooms and 20 Ribbon Pigs and collect 10 Orange Mushroom Caps and 10 Pig's Ribbons. It shouldn't be too hard, since Orange Mushrooms and Ribbon Pigs are commonly found near Kerning City.\nI delivered what Don Hwang asked for and got bunch of Lemons in return. I wonder what kind of armor Don Hwang will make. Nella said there are many more requests I can do. I should visit Nella every once in a while.","rewards_exp":171,"rewards_money":292,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Shumi's Request","level_min":10,"npc_name":"Nella","description":"I received the second request from Nella. Shumi, who sits in front of the Subway, wants to build a house for the puppy she received from her friend. I should defeat 25 Dark Stumps and bring 15 Leafs to Nella for the puppy house.\nI delivered what Shumi asked for and got bunch of Cakes in return. Now, Shumi's little puppy has his own house. Return to Nella for another gig.","rewards_exp":171,"rewards_money":292,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Andre's Request","level_min":10,"npc_name":"Nella","description":"I got a third request from Nella. Andre, an assistant at the Hair Salon, is apparently struggling with meals as a lifelong bachelor and wants to make some tasty Seafood Soup. I'll need to defeat 30 Octopuses and collect 20 Octopus Legs. I'll also need 1 Pure Water. Once I've gathered everything, I should bring it to Nella.\nI delivered what Andre asked for and got a glove in return. I hope he enjoys his hearty bowl of Seafood Soup. Return to Nella for another gig.","rewards_exp":171,"rewards_money":292,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Dr. Faymus's Request","level_min":22,"npc_name":"Nella","description":"Nella says that I\u2019ve grown a lot since my last visit. She\u2019s starting to give me slightly tougher tasks than before. First, she mentions that Dr. Faymus, the owner of the potion shop, has run out of ingredients while working on a new potion. He needs me to hunt 40 Jr. Neckis and 40 Horny Mushrooms, and collect 20 Jr. Necki Skins and 20 Horny Mushroom Caps. Taking on Jr. Necki might be a bit tricky, but it shouldn\u2019t be too much trouble for me!\nI delivered what Dr. Faymus asked for and got bunch of White Potions in return. I wonder what kind of potion Dr. Faymus will make using those materials. Return to Nella for another gig.","rewards_exp":2306,"rewards_money":643,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Chris's Request","level_min":22,"npc_name":"Nella","description":"I got another request from Nella. Chris's pillow was stolen a few days ago and now he can't sleep. To make a new pillow, he needs 20 Stiff Feathers and 20 Leathers. I should get them as soon as possible, so Chris can get some sleep!\nI delivered what Chris asked for and got some refined iron and bronze. Chris can finally sleep well with his new pillow. Return to Nella for another gig.","rewards_exp":2306,"rewards_money":643,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Cutthroat Manny's Request","level_min":22,"npc_name":"Nella","description":"I got a third request from Nella. Cutthroat Manny, the owner of the weapon shop, is quite the unusual foodie\u2014he wants to cook up a special dish of Evil Eye Stir-Fry. He needs me to hunt 50 Evil Eyes and bring back 30 Evil Eye Tails. Sounds like he\u2019ll be eating well for a while! Once I've gotten everything, bring it back to Nella.\nI delivered what Cutthroat Manny asked for and got a pair of shoes in return. Now... Cutthroat Manny doesn't have to worry about his dinner menu for a while. After helping out the people in this town, I feel like I\u2019ve really become close with them!","rewards_exp":2306,"rewards_money":643,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Stranger's Request","level_min":23,"npc_name":"Jane Doe","description":"I heard there is someone in Niora Hospital in Kerning City...\nI met Jane Doe in Niora Hospital in Kerning City. Jane Doe needed to take off the bandages to see the surgery result, but there was no mirror. Jane Doe asked me to defeat 40 Stirges and collect 20 Broken Mirror Glasss...\nFor the Stranger I met in Niora Hospital, I actually collected Broken Mirror Glass and brought it back to her.","rewards_exp":2418,"rewards_money":672,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Stranger's Identity","level_min":23,"npc_name":"Jane Doe","description":"The Stranger I met in Niora Hospital is, surprisingly, a ghost! She remained in the hospital, unaware that she had died, waiting for Naora to return... Now unwilling to accept her death, she told me that in order to live again, she needs me to defeat 50 Zombie Mushrooms and collect 25 Charm of the Undeads. She asked for my help one last time. I wonder if that\u2019s really all it takes to bring her back...\nJane Doe who I met in Niora Hospital was a ghost. She was staying in the Hospital, not knowing that she was dead. She couldn't live again with Charm of the Undead. It seems that she already knew she couldn't make it... I really hope she finds peace.","rewards_exp":2418,"rewards_money":672,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Proof of Companionship","level_min":21,"npc_name":"Lakelis","description":"It seems that Lakelis in Kerning City is looking for a party to take on a party quest that requires multiple adventurers to work together.\nLakelis in Kerning City asked me to challenge the party quest\u00a0\"First Time Together\u201d and defeat the King Slime inside. The party quest must be attempted by a party of four adventurers, all level 21 or higher. Once the party is ready, the party leader should speak to Lakelis. Better start looking for some friends to join me.\nAs requested by Lakelis, my friends and I challenged the party quest \"First Time Together\u201d and defeated King Slime. When everyone works together, there\u2019s nothing that can\u2019t be done!","rewards_exp":2193,"rewards_money":614,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"[Construction Site B1] Shumi's Lost Coin","level_min":35,"npc_name":"Shumi","description":"Let's start looking for Shumi in Kerning City.\nI met this girl named Shumi in Kerning City. She was devastated about losing the lucky coin that she borrowed from a friend, and she asked me to find it for her. She also told me that a bunch of guys draped in white cloth took it from her in the subway, and that I might find them at the Construction Site B1, deep in the station... I should go there first...\nI found the lost coin that Shumi of Kerning City was looking for, and returned it to her. A precious coin borrowed from her friend, huh... as a reward, she gave me a bunch of return scrolls... not bad at all!! She also said other items can be found at Construction Site B1... I should check it out later...","rewards_exp":4162,"rewards_money":1023,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"[Construction Site B2] Shumi's Lost Roll of Cash","level_min":35,"npc_name":"Shumi","description":"Let's go look for Shumi in Kerning City.\nI ran into Shumi again in Kerning City. She seemed really worried about how she lost her rent money because a Stirge flew over and snatched a bundle of money away from her. Man... do I have to walk back in there again... can I just pay the rent for her? Anyway like last time, I need to go back in there, this time to Construction Site B2 and find the bundle of money she lost. Aye, better go in there now...\nI got Shumi from Kerning City the lost bundle of money. Guess she can pay her rent now... and as a reward, she got me 30 Blue Potions... She also said I can find other items at the Construction Site B2... I should go check it out sometime...","rewards_exp":4162,"rewards_money":1023,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"[Construction Site B3] Shumi's Lost Sack of Cash","level_min":35,"npc_name":"Shumi","description":"Let's go look for Shumi in Kerning City.\nI ran into Shumi again at Kerning City. A while ago, she got a favor from JM From tha Streetz to get some Screws for him, only to have the sack of money fall down and lose everything in the process. I guess I can find the sack of money in the deep part of the subway station, the Construction Site B3, again.\nI found Shumi's lost Money Sack in the Kerning City subway. Shumi can now buy what JM From tha Streetz asked for. I received mesos and some potions as a gift. I should go to Construction Site B3 in the subway to look for more stuff.","rewards_exp":4162,"rewards_money":10000,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"I'm Bored 1","level_min":11,"npc_name":"Icarus","description":"I should go see Icarus, who's at the top of a building in Kerning City. He seems to be bored out of his mind.\nI got to talk to Icarus in Kerning City. Just what exactly is he doing staring aimlessly at the sky anyway? He seemed to be really bored, and asked me if I can answer his questions.\nI answered all the questions that Icarus of Kerning City asked. That was easy.","rewards_exp":236,"rewards_money":321,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"I'm Bored 2","level_min":11,"npc_name":"Icarus","description":"I answered all the questions that Icarus of Kerning City asked. That was easy.\nI answered all of Icarus's questions, but he still seemed bored out of his mind. He asked me if I could get him a toy that he could play around with.\nI had fun playing around with Icarus.","rewards_exp":236,"rewards_money":321,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Icarus's Hang Glider","level_min":31,"npc_name":"Icarus","description":"Apparently there's someone in Kerning City by the name of Icarus that stands on top of a building just staring at the sky 24/7.\nI got to meet Icarus on top of a building at Kerning City. He seems like a nice guy who has an unquenchable thirst for flying, and he wants to create a hang glider to fulfill his dream of flying. He asks me if I can gather up the materials for the hang glider, and even though the process of making the hang glider seems dubious at best, I can't say no to his sincere desire to fly. I'll need to get him 30 Stirge Wings, 10 Processed Woods, and 15 Stiff Feathers.\nI got the materials needed for Icarus to make the hang glider and realize his dream of flying. I just wonder if Stirge wings are enough to make the hang glider. I don't know if this will really work, but he might end up succeeding, so I should check up on him around the time the hang glider should be ready to take flight.","rewards_exp":3318,"rewards_money":906,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Icarus and the Balloon","level_min":31,"npc_name":"Icarus","description":"I wonder how Icarus's doing with the hang glider... Maybe I should go check up on him in Kerning City.\nIcarus failed to create a working hang glider, and is now attempting to create a flying balloon on his never-ending quest for flight. This looks just as preposterous as his last attempt, but I don't think I can stop him. To make the flying balloon, he needs 50 Tablecloths and 10 Alligator Skin Pouchs. Hope this works...\nI got the materials needed for Icarus to make the flying balloon and realize his dream of flying. I don't know if his \"flying balloon\" will actually fly, but there's a chance that it might work. I'll check up on him around when the flying balloon should be ready to take flight and see if he's for real this time.","rewards_exp":3318,"rewards_money":906,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"In search of Wing the Fairy","level_min":46,"npc_name":"Icarus","description":"I wonder how Icarus's doing with the flying balloon... Maybe I should go check up on him in Kerning City.\nIcarus failed to make the flying balloon, but his never-ending quest for flight continues. This time he wants to deviate from a scientific approach to flight and opt for a magical approach, and asks me to see his best friend Wing the Fairy in Ellinia, the town of fairies. Apparently Wing the Fairy knows how to make Flying Medicine... I'll need to see that fairy in Ellinia for Icarus's sake.\nWing the Fairy in Ellinia seemed to dislike humans so much that he wouldn\u2019t even listen to what I had to say.","rewards_exp":4803,"rewards_money":941,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"The Ingredients for the Flying Pill","level_min":46,"npc_name":"Wing the Fairy","description":"It doesn\u2019t seem easy to talk to Wing the Fairy.\nI met Wing the Fairy in Ellinia, and he doesn't seem to like people in general. How is he best friends with Icarus in the first place? Anyway, he says in order to make the Flying Medicine, he's going to need 50 Medicine With Weird Vibes and 20 Witchgrass Leafs. So that's all it takes\nAs Wing the Fairy asked, I got him Medicine With Weird Vibes and Witchgrass Leafs. Can he make Flying Medicine with these","rewards_exp":6862,"rewards_money":1345,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Kerning City","name":"Delivering the Flying Pill","level_min":46,"npc_name":"Wing the Fairy","description":"It looks like the Flying Medicine that will finally fulfill Icarus\u2019s dream has been completed.\nWing the Fairy of Ellinia asked me to take the Flying Medicine to Icarus. So this little pill is all it takes to fly? I need to get this to Icarus ASAP.\nI got Icarus the Flying Medicine that Wing the Fairy of Ellinia made. I hope it works for him.","rewards_exp":6862,"rewards_money":1345,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Perion","name":"Fixing Blackbull's House","level_min":11,"npc_name":"Blackbull","description":"I heard that \"Blackbull\" in Perion is fixing up his house.\nRight here, in this dusty town of Perion, I ran into an oddly-dres
