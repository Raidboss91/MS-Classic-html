sed man named \"Blackbull.\" He told me he needs to fix his house and wondered if I could help him out by defeating 20 Stumps and 20 Dark Stumps and getting him 10 Tree Branches and 10 Leafs. If I do him a favor, I'll get a nice shield from him, but what if I say no? I wouldn't... be... EATEN BY HIM... no?? I really hope not...\nI got \"Blackbull\" of Perion 10 Tree Branches and 10 Leafs after defeating 20 Stumps and 20 Dark Stumps. With these, he can finally fix his house. I got this shield as a reward... and... well, scratch marks here and there, and it looks pretty old... is this even usable","rewards_exp":236,"rewards_money":321,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Perion","name":"Building a New House For Blackbull","level_min":48,"npc_name":"Blackbull","description":"I heard that \"Blackbull\" in Perion is building a new house...\nI ran into \"Blackbull\" again, the guy whose house I helped fix. He was surprised at how strong I looked and asked me for a much harder favor. His cousins from Henesys are all trying to move to Perion, so he needs to build a new house! To build a new house, he said he needed 100 Stone Golem Rubbles, 30 Screws, 30 Processed Wood, and \"Blackbull's\" deed to the land. His son had the deed to the land, but it was stolen by Curse Eyes near Sleepywood... hmmm... I should be looking for those wandering around the deep forest...\nSo that all of \"Blackbull's\" cousins could move to Perion, I got him the items he requested. It was really tough, and I hope he doesn't ask me to BUILD a house for him next time...","rewards_exp":7425,"rewards_money":1404,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Perion","name":"Old Gladius","level_min":50,"npc_name":"Manji","description":"Find Manji in Perion.\nI came across Manji again, whom I had first met in Perion when making the medicine for Maya, the little girl in Henesys. Surprised at how much stronger I had become, Manji asked me for a favor. Long ago, when he was in danger of being struck down by Balrog, he was saved by the legendary hero Tristan, who died in his place. Ever since then, Manji had held onto Tristan\u2019s sword. But the blade, corrupted by Balrog\u2019s evil aura, has become so worn down that it can hardly even be called a sword anymore\u2026\nManji handed me the Old Gladius he had been keeping and asked me to awaken it back to its true form. Once fully awakened, it is said to become the Hero's Gladius. Just as Manji said, I should seek out Chrishrama in Sleepywood.\nI met Chrishrama in Sleepywood and was able to ask him how to awaken the Old Gladius.","rewards_exp":7987,"rewards_money":1462,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Perion","name":"Reawakening the Gladius","level_min":50,"npc_name":"Chrishrama","description":"See Chrishrama in Sleepywood to awaken the Old Gladius.\nI showed Chrishrama Manji's Old Gladius, and he claimed to have made it himself. He said he needs 1 Star Rock, 1 Piece of Ice, 1 Ancient Scroll, and 1 Flaming Feather to awaken it. Unfortunately, I've never heard of any of those items... He recommended talking to Mike in Perion Dungeon Entrance to find them.\nI gathered the materials needed for the awakening and took them to Chrishrama. Chrishrama used the materials to reawaken the Old Gladius into the Hero's Gladius. It's a nice sword radiating a mysterious light... It's a shame I have to give it to Manji.","rewards_exp":7987,"rewards_money":1462,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Perion","name":"Hero's Gladius","level_min":50,"npc_name":"Chrishrama","description":"After much hardship, I finally managed to gather all the materials Chrishrama asked for. Now, I can only trust in his power.\nWith Chrishrama\u2019s help, I was able to awaken the Old Gladius entrusted by Manji into the Hero's Gladius. All that remains is to return the sword to Manji.\nIt seems that this Hero's Gladius which Manji told me about is one fine sword. I had to make a hard decision choosing between the Hero's Gladius and the Skull Earrings that Manji offered me, but I will not regret my choice.","rewards_exp":7987,"rewards_money":1462,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Perion","name":"Searching for Fossils","level_min":17,"npc_name":"Winston","description":"I heard that Winston the archeologist is searching for something in the Rocky Mountains on the east side of Perion...\nWinston, the archeologist who I ran into in the rocky mountains on the east side of Perion, said he lost the fossils he collected near Perion. He asked me to bring back 12 Animal Fossils and 12 Plant Fossils that were taken by Green Mushrooms and Axe Stumps. How can he lose something so important like that? He's more careless than he looks...\nI found the fossils that Winston lost.","rewards_exp":1104,"rewards_money":497,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Perion","name":"Delivering a Box of Fossils","level_min":17,"npc_name":"Winston","description":"It seems the archaeologist Winston in the Rocky Mountains on the East side of Perion has another request.\nWinston the Archeologist said that it is not safe to leave the valuable fossils in the tent. He asked me to take the fossils and deliver them to Dr. Betty in Ellinia. He also wrote a letter of introduction for me to show her.\nWinston the Archeologist in Perion said that it is not safe to leave the valuable fossils in his tent. He asked me to deliver them to Dr. Betty in Ellinia. Dr. Betty said she's going to be really busy from now, and she asked me to stop by again and give her a hand afterwards. Fossils huh...? Should I give it a try","rewards_exp":772,"rewards_money":497,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Perion","name":"Research on Plant Fossils","level_min":17,"npc_name":"Betty","description":"Dr. Betty, a biologist near Ellinia, is looking for an assistant.\nDr. Betty asked me to work as an assistant for a while. My first task from her is to collect 20 Plant Samples. I can see various plants covering the woods in Ellinia.\nMy first job as Dr. Betty's assistant was to collect some plants in the woods in Ellinia and sample them. It wasn't that hard, I guess.","rewards_exp":1104,"rewards_money":497,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Perion","name":"Research on Animal Fossils","level_min":17,"npc_name":"Betty","description":"It seems the biologist Dr. Betty near Ellinia has another request.\nDr. Betty in Ellinia told me that she needs 1 Stuffed Drake Skull for her research. She asked me to find her daughter near Henesys, and bring it back to her. Where would Anne be\nI met Dr. Betty's daughter, Anne, playing near Henesys by herself.","rewards_exp":1104,"rewards_money":497,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Perion","name":"Transporting Drake's Skull","level_min":17,"npc_name":"Anne","description":"It looks like Anne has the item that Dr. Betty needs.\nI received the Stuffed Drake Skull from Anne, Dr. Betty's daughter. Now I have to deliver this carefully to Dr. Betty...\nI collected some Plant Samples and a Stuffed Drake Skull to help Dr. Betty's research on fossils. I can't wait to see the results... I should go and see Dr. Betty, because she said she would tell me when I go back.","rewards_exp":772,"rewards_money":497,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Perion","name":"Progress on Fossil Research","level_min":17,"npc_name":"Betty","description":"I heard Dr. Betty has finished her fossil research. Maybe I should go and see the results.\nI met Dr. Betty again. She told me the research was finished and explained it to me, then asked me to take the research report and deliver it to Dr. Winston in Perion. Dr. Betty also informed me that if I take 20 Leafs, 15 Firewoods, 1 Stump's Teardrop, and 1 pair of Weighted Earrings, Dr. Winston would be really happy.\nI delivered Dr. Betty's Fossil Report to Dr. Winston in Perion. Along with the report, I also gave him the Leafs, Firewoods, Stump's Teardrop, and Weighted Earrings. In return, Dr. Winston gave me the Leaf Earrings.","rewards_exp":1104,"rewards_money":497,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Perion","name":"The Stump Horror Story","level_min":10,"npc_name":"Ayan","description":"Ayan of Perion says she can't take one step out of town. I wonder why...\nI met Ayan in Perion. Apparently, she cannot remember anything about her childhood, and she lives everyday in fear of Stumps. She's so scared that she can't even dare to look at them. Due to this paralyzing fear of Stumps, she cannot take one step out of Perion, and asks me to take them out for her sake. Are they really THAT scary\nI took out Stumps for Ayan's sake in Perion. She can finally venture outside without having to worry about them!","rewards_exp":171,"rewards_money":292,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Perion","name":"Taking Out the Alligators 1","level_min":48,"npc_name":"Ayan","description":"I heard something happened to the tribespeople of Perion. I should go ask Ayan about this.\nI met up with Ayan in Perion. She told me that a few days ago, a group of tribespeople went hunting in the swamp and wound up being ambushed by a group of alligators. She was worried about the sudden surge of alligators taking over the swamp and asked me to reduce their numbers before they spawn out of control. I'll have to kill 100 Ligators and 40 Jr. Neckis and pick up 20 Jr. Necki Skins along the way.\nThe tribespeople of Perion got ambushed by the alligator herd at the swamp, so Ayan asked if I could help take care of the alligators. I responded by taking out 100 Ligators and 40 Jr. Neckis. Hopefully this will bring some peace back to the swamp.","rewards_exp":7425,"rewards_money":1404,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Perion","name":"Taking Out the Alligators 2","level_min":48,"npc_name":"Ayan","description":"Ayan of Perion is desperately looking for me. Is something wrong\nI found Ayan, and she seemed to be panicking. She was walking around the swamp when she ran into a bigger, stronger, and more dangerous group of alligators than the previous one. She ran back to Perion and has been looking for me to ask me for help ever since. This time, I'll need to kill 120 Crocos and bring back 50 Croco Skins along the way.\nAt Ayan's request, I took out 120 Crocos in the swamp. I'll have to revisit that spot from time to time and take out the alligators before they spawn out of control.","rewards_exp":7425,"rewards_money":1404,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Sleepywood","name":"A Clue to the Secret Book","level_min":32,"npc_name":"Ronnie","description":"I heard Mr. Wetbottom in Sleepywood is going through hard times... I should go check on him.\nAt the VIP sauna in Sleepywood, I met this bald man called Mr. Wetbottom. He has a son, and apparently he ran away from home one day with a book that he cares deeply for. He requested that I find his son and get the book back from him. For a reward, he's offering me a nice sauna robe. He also told me his son Ronnie hangs out at a tree tunnel around Ellinia, so maybe I can find him there. Anyway, is that book more important to him than his son?? What kind of a book is it anyway...????\nI found Ronnie in the tree tunnel of Ellinia, as requested by Mr. Wetbottom, whom I met at the VIP Sauna.","rewards_exp":3487,"rewards_money":936,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Sleepywood","name":"Hungry Ronnie","level_min":32,"npc_name":"Ronnie","description":"Inside a tree tunnel around Ellinia, I found Ronnie, the son of Mr. Wetbottom. He said he could never hand over the red book, but he looked pretty hungry. Ronnie asked me to defeat Lupins in the western area of Ellinia and bring back 30 Lupin's Bananas.\nI brought a bunch of Lupin's Bananas for the hungry Ronnie. But it looks like he still wants to eat more...","rewards_exp":3487,"rewards_money":936,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Sleepywood","name":"Still Hungry Ronnie","level_min":32,"npc_name":"Ronnie","description":"Ronnie said the Lupin's Bananas weren\u2019t enough and asked me to go see Rina at Henesys to get Rina's Unagi Special.\nI went to see Rina of Henesys first to help feed the hungry Ronnie.","rewards_exp":2440,"rewards_money":655,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Sleepywood","name":"Secret to Unagi Special","level_min":32,"npc_name":"Rina","description":"Rina of Henesys requested 50 Curse Eye Tails and 10 Pig's Heads for the Rina's Unagi Special.\nI brought Rina everything needed to make Rina's Unagi Special.","rewards_exp":3487,"rewards_money":936,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Sleepywood","name":"Rina\u2019s Unagi Special","level_min":32,"npc_name":"Rina","description":"I brought everything Rina asked for and received Rina's Unagi Special. I just hope Ronnie will be satisfied with this...\nI brought Rina's Unagi Special to Ronnie. That kid sure seems to be enjoying it!","rewards_exp":3487,"rewards_money":936,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Sleepywood","name":"Thirsty Ronnie","level_min":32,"npc_name":"Ronnie","description":"While eating Rina's Unagi Special, Ronnie said he needed something to drink and asked me to go see Rowen the Fairy of Ellinia to get Fresh Milk.\nI went to see Rowen the Fairy of Ellinia to help quench Ronnie\u2019s thirst.","rewards_exp":2440,"rewards_money":655,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Sleepywood","name":"Cold Milk","level_min":32,"npc_name":"Rowen the Fairy","description":"Rowen the Fairy of Ellinia asked for a refined piece of glittering Diamond for a Fresh Milk. A Diamond, huh... how am I supposed to get that rare, expensive item\nI brought a Diamond to Rowen the Fairy.","rewards_exp":3487,"rewards_money":936,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Sleepywood","name":"Satisfied Ronnie","level_min":32,"npc_name":"Rowen the Fairy","description":"I brought a Diamond to Rowen the Fairy and received Fresh Milk in return. I just hope Ronnie will be satisfied with this...\nI brought the Fresh Milk to Ronnie. Phew, I guess he\u2019s too full to eat any more now!","rewards_exp":3487,"rewards_money":936,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Sleepywood","name":"Returned Secret Book","level_min":32,"npc_name":"Ronnie","description":"I got Ronnie some yummy food in exchange for the Secret Book. I want to peek inside...\nI got Mr. Wetbottom the precious Secret Book that he'd been desperately looking for. I asked him if he's worried about Ronnie at all, only to hear that he'll be in good hands with the fairies... well, it'd be best for Ronnie to be with the fairies, right? Anyway, I got the sauna clothes in return for the book... I guess wearing these cumbersome armors in the sauna is a ridiculous thing to do. Might as well enjoy it now and relax here at the sauna...","rewards_exp":3487,"rewards_money":936,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Sleepywood","name":"[Forest of Patience] Sabitrama and the Diet Medicine","level_min":25,"npc_name":"Sabitrama","description":"Let's go look for Sabitrama in Sleepywood.\nIn front of the Sleepywood Hotel, I met Sabitrama, a medicinal herb trader who seems to be the younger brother of Chrishrama. He said he found a place where he can finally find the herb that he needed for this medicine he's working on... and he asked if I could go in that forest and grab an herb called Pink Anthurium. It consists of green grass and a small pink flower... I should remember this well and get him the exact same one. I heard the place is near Ellinia... I should go there and talk to this guy Shane...\nThankfully I got the flower that Sabitrama wanted from the Forest of Patience, and as a sign of appreciation, he gave me a scroll for overall armor. Oh, and he also said that from here on out, I can enter the Forest of Patience without having to pay Shane of Ellinia. From what I've heard, the diet medicine Sabitrama's working on is for Shane's fiance... I better get back in the Forest of Patience when I have some time...","rewards_exp":2587,"rewards_money":731,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Sleepywood","name":"[Forest of Patience] Sabitrama's Anti-Aging Medicine","level_min":25,"npc_name":"Sabitrama","description":"I heard that Sabitrama in Sleepywood is making a new medicine...\nI ran into Sabitrama again in front of the Sleepywood Hotel, the same one I helped get herbs before. This time, he said he found a place where I can get an important herb that he needed for his new medicine. He asked me if I could go into that forest and grab Double-Rooted Red Ginseng for him. It was a reddish root split in two... I should remember it well and find the same one once I get to the top. The herb is in the forest owned by Shane of Ellinia, whom I visited last time...\nThankfully I got the herb that Sabitrama asked me to get, and for that, I got rewarded with a mysterious rock. And from here on out, I don't have to pay Shane every time I go in the Forest of Patience. From what I hear, that anti-aging medicine Sabitrama is working on may be what Shane needed... if I have time, I should go back in there...","rewards_exp":2587,"rewards_money":731,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Forgotten Hollow","name":"Zelya's Map","level_min":39,"npc_name":"Zelya","description":"The cave fairy Zelya in the Forgotten Hollow seems to have a request. But even finding where the Forgotten Hollow is located may be a challenge in itself...\nThe cave fairy Zelya in the Forgotten Hollow explained that she once lived much deeper inside the cave. She longs to return to her old home, but while out on a walk she was attacked by Glowshrooms and dropped the map she had drawn to find her way back. The monsters may have already torn it to pieces, but if I defeat the Glowshrooms east of Forgotten Hollow and gather the fragments, she might be able to figure something out.\nAs the cave fairy Zelya requested, I defeated the monsters and brought back the fragments of the map to her original home. Hopefully some clues can still be found within them...","rewards_exp":5062,"rewards_money":1140,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Forgotten Hollow","name":"Natural Adhesive","level_min":39,"npc_name":"Zelya","description":"The cave fairy Zelya in the Forgotten Hollow seems to have a new request.\nThe cave fairy Zelya in the Forgotten Hollow was struggling to piece together the fragments of her map. To restore it, she asked me to bring her Raffle Petals, which can be obtained by defeating Raffles east of the village. Looks like that\u2019s where I'll need to go.\nAs Zelya requested, I defeated Raffles and gathered enough Raffle Petals to bring back to her.","rewards_exp":5062,"rewards_money":1140,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Forgotten Hollow","name":"The Road Back Home","level_min":43,"npc_name":"Zelya","description":"The cave fairy Zelya in Forgotten Hollow seems to have yet another request.\nZelya restored her precious map and tried to follow it back to her old home, but she could not make it past the fierce monsters blocking the way. She asked me to defeat the monsters west of the Forgotten Hollow to help her get home safely.\nAs Zelya requested, I defeated Aqumanders and Echopuses. Yet it felt as though monsters continued to pour out from deeper within the cave. What on earth could be happening inside","rewards_exp":6075,"rewards_money":1257,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Forgotten Hollow","name":"Old Friends","level_min":49,"npc_name":"Myra","description":"Myra in Perilous Descent I seems to be overcome with grief.\nMyra in Perilous Descent I wants her changed companions to rest in peace. At her request, I must put down the nearby Myewood, as well as the Sporewood deeper in the cave.\nFollowing Myra\u2019s plea, I had no choice but to fell the creatures that were once her companions. How did they end up like this...","rewards_exp":7706,"rewards_money":1433,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Forgotten Hollow","name":"Myra\u2019s Old Friend","level_min":49,"npc_name":"Myra","description":"Myra in Perilous Descent I seems to have another request.\nMyra in Perilous Descent I asked me to deliver news of this place to another of her old friends, Grendel the Really Old. I should be able to find Grendel the Really Old atop Ellinia, at the Magic Library.\nWhen I met Grendel the Really Old in Ellinia, he was astonished to hear that the Forgotten Hollow had been rediscovered, and he seemed deeply troubled about what was happening there.","rewards_exp":5394,"rewards_money":1003,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Florina Beach","name":"Special Taste of Florina Beach I","level_min":37,"npc_name":"Riel","description":"A beautiful girl by the name of Riel from Florina Beach seems to be in need of help...\nRiel introduced me to a part time job, where I have to collect 10 Coconuts. Why don't I start collecting those delicious looking Coconuts over there on the right\nI brought back fresh Coconuts just like Riel said. Riel told me I can come back for work anytime I want. I guess I won't be starving here in Florina Beach.","rewards_exp":4612,"rewards_money":1082,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Florina Beach","name":"Special Taste of Florina Beach II","level_min":37,"npc_name":"Riel","description":"Riel in Florina Beach asks me a question about Florina Beach. Piece of cake~ I can answer that before I start my work.\nI have to prepare enough ingredients for 15 people, and bring them to Riel in Florina Beach.\nI answered all the questions that Riel gave me and passed her tests, then went to collect ingredients for 15 people.","rewards_exp":4612,"rewards_money":3246,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Florina Beach","name":"Special Taste of Florina Beach III","level_min":37,"npc_name":"Riel","description":"It seems that Riel in Florina Beach wants to ask for another favor.\nI have to bring ingredients for 30 people to Riel in Florina Beach.\nI worked part-time gathering ingredients for cooked meals for the tourists coming to Florina Beach.","rewards_exp":4612,"rewards_money":6492,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Florina Beach","name":"Special Taste of Florina Beach IV","level_min":37,"npc_name":"Riel","description":"Riel is trying to develop a special dish in Florina Beach.\nI need to collect some ingredients to develop the Special Taste of Florina Beach. I heard that 10 Coconuts, 10 Lorang Claws, 10 Clang Claws, and 10 Lupin's Bananas are necessary. Will Valen's new recipe succeed~?\nI'm familiar with working in Florina Beach. I visited Riel one more time and helped her out. Why is she so desperate to help Valen","rewards_exp":4612,"rewards_money":3246,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Job Advancement","name":"The Warrior's Next Journey","level_min":30,"npc_name":"Dances with Balrog","description":"Having reached level 30 and mastered the way of the Swordsman, I feel the urge to learn even more.\nPerhaps Dances with Balrog of Perion could teach me greater lessons.\nPerion\u2019s Dances with Balrog seemed surprised to see how much stronger I had become compared to before.","rewards_exp":3150,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Job Advancement","name":"Finding the Instructor","level_min":30,"npc_name":"Dances with Balrog","description":"It seemed like Dances with Balrog in Perion wanted to test whether I was worthy of receiving his teachings.\nPerion\u2019s Dances with Balrog handed me a letter and told me to deliver it to #bWarrior Job Instructor, who can be found somewhere in West Rocky Mountain IV. He said I\u2019d be able to learn more details there.\nIn West Rocky Mountain IV, I met Warrior Job Instructor. He said he would test whether I was worthy of making the 2nd job advancement. Great! I told him I was ready for anything!","rewards_exp":3150,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Job Advancement","name":"Test of Qualification","level_min":30,"npc_name":"Warrior Job Instructor","description":"West Rocky Mountain IV\u2019s Warrior Job Instructor seems ready to give me a test to prove whether I deserve to become stronger.\nWest Rocky Mountain IV\u2019s Warrior Job Instructor gave me a mission to enter a hidden area, defeat the monsters there, and collect a certain item.\nI passed Warrior Job Instructor\u2019s test in West Rocky Mountain IV!","rewards_exp":3150,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Job Advancement","name":"Proof of Qualification","level_min":30,"npc_name":"Warrior Job Instructor","description":"Now that I\u2019ve passed #bWarrior Job Instructor\u2019s test, my strength should be proven!\nI received The Proof of a Hero for successfully passing the Warrior Job Instructor\u2019s test. I should return to Dances with Balrog in Perion.\nDances with Balrog in Perion welcomed me warmly, and I gained a new job, obtaining even greater power!","rewards_exp":3150,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Job Advancement","name":"The Magician's Next Journey","level_min":30,"npc_name":"Grendel the Really Old","description":"Having reached level 30 and mastered the way of the Magician, I feel the urge to learn even more.\nPerhaps Grendel the Really Old of Ellinia could teach me greater lessons.\nGrendel the Really Old said that if I can pass the test he gives, he\u2019ll gladly teach me more. I\u2019m no longer the weakling I once was, but hearing that I still have to face a trial makes me a bit nervous.","rewards_exp":3150,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Job Advancement","name":"Finding the Instructor","level_min":30,"npc_name":"Grendel the Really Old","description":"It seemed like Grendel the Really Old in Ellinia wanted to test whether I was worthy of receiving his teachings.\nEllinia\u2019s Grendel the Really Old handed me a letter and told me to deliver it to #bMagician Job Instructor, who can be found somewhere in The Forest North of Ellinia. He said I\u2019d be able to learn more details there.\nIn The Forest North of Ellinia, I met Magician Job Instructor. He said he would test whether I was worthy of making the 2nd job advancement. Great! I told him I was ready for anything!","rewards_exp":3150,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Job Advancement","name":"Test of Qualification","level_min":30,"npc_name":"Magician Job Instructor","description":"The Forest North of Ellinia\u2019s Magician Job Instructor seems ready to give me a test to prove whether I deserve to become stronger.\nThe Forest North of Ellinia\u2019s Magician Job Instructor gave me a mission to enter a hidden area, defeat the monsters there, and collect a certain item.\nI passed Magician Job Instructor\u2019s test in The Forest North of Ellinia!","rewards_exp":3150,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Job Advancement","name":"Proof of Qualification","level_min":30,"npc_name":"Magician Job Instructor","description":"Now that I\u2019ve passed #bMagician Job Instructor\u2019s test, my strength should be proven!\nAfter successfully passing Magician Job Instructor\u2019s test, I received The Proof of a Hero as proof. Now, I should return to Grendel the Really Old in Ellinia, right\nGrendel the Really Old in Ellinia welcomed me warmly, and I gained a new job, obtaining even greater power!","rewards_exp":3150,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Job Advancement","name":"The Bowman's Next Journey","level_min":30,"npc_name":"Athena Pierce","description":"Having reached level 30 and mastered the way of the Archer, I feel the urge to learn even more.\nPerhaps Athena Pierce of Henesys could teach me greater lessons.\nAthena Pierce said that if I can pass the test she gives, she\u2019ll gladly teach me more. I\u2019m no longer the weakling I once was, but hearing that I still have to face a trial makes me a bit nervous.","rewards_exp":3150,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Job Advancement","name":"Finding the Instructor","level_min":30,"npc_name":"Athena Pierce","description":"It seemed like Athena Pierce in Henesys wanted to test whether I was worthy of receiving her teachings.\nHenesys\u2019s Athena Pierce handed me a letter and told me to deliver it to #bBowman Job Instructor, who can be found somewhere in The Road to the Dungeon. He said I\u2019d be able to learn more details there.\nIn The Road to the Dungeon, I met Bowman Job Instructor. She said he would test whether I was worthy of making the 2nd job advancement. Great! I told her I was ready for anything!","rewards_exp":3150,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Job Advancement","name":"Test of Qualification","level_min":30,"npc_name":"Bowman Job Instructor","description":"The Road to the Dungeon\u2019s Bowman Job Instructor seems ready to give me a test to prove whether I deserve to become stronger.\nThe Road to the Dunge worthy of making the 2nd job advancement. Great! I told him I was ready for anything!","rewards_exp":3150,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Job Advancement","name":"Test of Qualification","level_min":30,"npc_name":"Thief Job Instructor","description":"Construction Site North of Kerning City\u2019s Thief Job Instructor seems ready to give me a test to prove whether I deserve to become stronger.\nConstruction Site North of Kerning City\u2019s Thief Job Instructor gave me a mission to enter a hidden area, defeat the monsters there, and collect a certain item.\nI passed Thief Job Instructor\u2019s test in Construction Site North of Kerning City!","rewards_exp":3150,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Job Advancement","name":"Proof of Qualification","level_min":30,"npc_name":"Thief Job Instructor","description":"Now that I\u2019ve passed #bThief Job Instructor\u2019s test, my strength should be proven!\nAfter successfully passing Thief Job Instructor\u2019s test, I received The Proof of a Hero as proof. Now, I should return to Dark Lord in Kerning City, right\nDark Lord in Kerning City welcomed me warmly, and I gained a new job, obtaining even greater power!","rewards_exp":3150,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"\"Mar\" the Fairy and the Water of Life","level_min":0,"npc_name":"","description":"At Ellinia, I ran into a fairy that's been busily studying the magic of life. Her name is \"Mar\" and after taking a look at my pet that's been turned into a doll, she told me she can make it come back alive with Water of Life and Life Scroll. I heard that she knows Cloy of Henesys... since it looks like a pet trainer named Trainer Bartos of Henesys knows something about the scroll of life, I should head over there...\nAfter easily passing the test from Trainer Bartos of Henesys, I got a hold of Water of Life and Life Scroll, and got that to Mar the Fairy. With her magical power and the items I got her, she turned the doll back into a living pet. I can hang out with him for a while longer now ... sweet ...","rewards_exp":0,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Make a Match Cards Set","level_min":12,"npc_name":"Casey","description":"It seems that Casey in Henesys Park knows a way to find a different kind of fun in Maple World.\nCasey, whom I met in Henesys Park, said he knows a way to enjoy myself when I get tired of hunting, and asked me to collect Monster Cards. He said I could easily get them by defeating any of these monsters scattered across Maple World: Blue Snail, Pig, Ribbon Pig, Octopus, Blue Mushroom, Horny Mushroom, Evil Eye, Curse Eye, Lupin, Cold Eye, Lorang, Tortie, Wraith, Drake, Wild Kargo. I should try to gather them when I have the time.\nI brought the requested items to Casey in Henesys Park and received a Set of Match Cards! With this, I can play the Match Cards mini-game with other adventurers anywhere! I should remember to ask Casey if I want to know more about the mini-game.","rewards_exp":321,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Make a Slime & Mushroom Omok Set","level_min":12,"npc_name":"Casey","description":"It seems that Casey in Henesys Park knows a way to find a different kind of fun in Maple World.\nCasey, whom I met in Henesys Park, said he knows a way to enjoy myself when I get tired of hunting, and asked me to collect a few items. He said I could get them by defeating Stump, Slime, and Orange Mushroom found around Henesys. I should try to gather them when I have the time.\nI brought the requested items to Casey in Henesys Park and received a Slime & Mushroom Omok Set! With this, I can play the Omok mini-game with other adventurers anywhere! I should remember to ask Casey if I want to know more about the mini-game.","rewards_exp":321,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Make a Slime & Pig Omok Set","level_min":12,"npc_name":"Casey","description":"It seems Casey in Henesys Park can make another type of Omok Set.\nCasey, whom I met in Henesys Park, said he could make a new type of Omok Set, and asked me to collect a few items. He said I could easily get them by defeating Stump, Slime, and Pig found around Henesys. I should try to gather them when I have the time.\nI brought the requested items to Casey in Henesys Park and received a Slime & Pig Omok Set! With this, I can play the Omok Mini-game with other adventurers anywhere! I should remember to ask Casey if I want to know more about the mini-game.","rewards_exp":321,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Make a Slime & Octopus Omok Set","level_min":12,"npc_name":"Casey","description":"It seems Casey in Henesys Park can make another type of Omok Set.\nCasey, whom I met in Henesys Park, said he could make a new type of Omok Set, and asked me to collect a few items. He said I could get them by defeating Stump, Slime, and Octopus found around Henesys and Kerning City. I should try to gather them when I have the time.\nI brought the requested items to Casey in Henesys Park and received a Slime & Octopus Omok Set! With this, I can play the Omok mini-game with other adventurers anywhere! I should remember to ask Casey if I want to know more about the mini-game.","rewards_exp":321,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Make a Pig & Mushroom Omok Set","level_min":12,"npc_name":"Casey","description":"It seems Casey in Henesys Park can make another type of Omok Set.\nCasey, whom I met in Henesys Park, said he could make a new type of Omok Set, and asked me to collect a few items. He said I could get them by defeating Stump, Pig, and Orange Mushroom found around Henesys. I should try to gather them when I have the time.\nI brought the requested items to Casey in Henesys Park and received a Pig & Mushroom Omok Set! With this, I can play the Omok mini-game with other adventurers anywhere! I should remember to ask Casey if I want to know more about the mini-game.","rewards_exp":321,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Make a Octopus & Mushroom Omok Set","level_min":12,"npc_name":"Casey","description":"It seems Casey in Henesys Park can make another type of Omok Set.\nCasey, whom I met in Henesys Park, said he could make a new type of Omok Set, and asked me to collect a few items. He said I could get them by defeating Stump, Orange Mushroom, and Octopus found around Henesys and Kerning City. I should try to gather them when I have the time.\nI brought the requested items to Casey in Henesys Park and received a Octopus & Mushroom Omok Set! With this, I can play the Omok mini-game with other adventurers anywhere! I should remember to ask Casey if I want to know more about the mini-game.","rewards_exp":321,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Henesys","name":"Make a Pig & Octopus Omok Set","level_min":12,"npc_name":"Casey","description":"It seems Casey in Henesys Park can make another type of Omok Set.\nCasey, whom I met in Henesys Park, said he could make a new type of Omok Set, and asked me to collect a few items. He said I could get them by defeating Stump, Pig, and Octopus found around Henesys and Kerning City. I should try to gather them when I have the time.\nI brought the requested items to Casey in Henesys Park and received a Pig & Octopus Omok Set! With this, I can play the Omok Mini-game with other adventurers anywhere! I should remember to ask Casey if I want to know more about the mini-game.","rewards_exp":321,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Crafting","name":"Silas Irons in Need of an Apprentice","level_min":10,"npc_name":"Silas Irons","description":"The master blacksmith of Perion, Silas Irons, seems to be looking for someone worthy of becoming his apprentice.\nThe master blacksmith of Perion, Silas Irons, has given me a test to see if I\u2019m fit to become his apprentice. He says a blacksmith needs proper strength and knowledge, and told me to defeat monsters around Perion and bring back raw ore. It looks like raw ore can be obtained from monsters.\nI passed the test given by Silas Irons, the master blacksmith of Perion. Does this mean I can become a true blacksmith in Maple World","rewards_exp":171,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Crafting","name":"A Blacksmith in My Own Right!","level_min":25,"npc_name":"Silas Irons","description":"It looks like Silas Irons, the master blacksmith of Perion, is finally ready to acknowledge my skills.\nSilas Irons, the master blacksmith of Perion, was impressed by how much I\u2019ve grown and suggested I show off my abilities. I need to defeat Dark Axe Stumps and Zombie Mushrooms, then create an Orihalcon Ingot and a Gold Ingot, and bring them back to him.\nSilas Irons, the master craftsman of Perion, was amazed by my work and handed me a Equipment Crafting Stimulator. It seems to be a special item that can alter the stats of equipment when used during crafting. Maybe I should give it a try.","rewards_exp":2587,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Crafting","name":"Silas Irons in Need of Help","level_min":15,"npc_name":"Silas Irons","description":"It looks like Silas Irons, the master blacksmith of Perion, needs some help. Maybe I should go check in on him.\nSilas Irons, the master blacksmith of Perion, received an important request but is struggling because he\u2019s short on materials. To help him, I need to defeat Bubblings and bring back Mithril Ingot.\nI delivered the items Silas Irons requested without any issues. At this rate, I might really be considered a fine apprentice.","rewards_exp":705,"rewards_money":0,"is_daily":false,"is_weekly":true,"is_repeatable":false},{"region":"Crafting","name":"Mr. Thunder in Need of an Apprentice","level_min":10,"npc_name":"Mr. Thunder","description":"It seems Mr. Thunder, the master weapon craftsman of Perion, is looking for someone worthy of becoming his apprentice.\nMr. Thunder, the master weapon craftsman of Perion, gave me a test when I asked to become his apprentice. He said that weaponcrafting requires proper strength and knowledge, and told me to use my Smithing skill to craft one Bronze Ingot and one Iron Ingot. As long as I have the materials, it shouldn\u2019t be too difficult.\nI passed the test given by Mr. Thunder, the master weapon craftsman of Perion. Does this mean I can now become a true weaponcrafting specialist in Maple World","rewards_exp":171,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Crafting","name":"A Weaponcrafter in My Own Right!","level_min":25,"npc_name":"Mr. Thunder","description":"It seems Mr. Thunder, the master weaponcrafter of Perion, is finally ready to acknowledge my weaponcrafting skills.\nMr. Thunder, the master weaponcrafter of Perion, was amazed by my growth and suggested that I show off my skills. I need to defeat Iron Hogs and craft one Monkey Wrench to bring back to him.\nMr. Thunder, the master weaponcrafter of Perion, was impressed by my craftsmanship and handed me a Equipment Crafting Stimulator. It looks like a special item that can change an equipment\u2019s stats when used during crafting. Maybe I should try it out.","rewards_exp":2587,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Crafting","name":"Mr. Thunder in Need of Help","level_min":15,"npc_name":"Mr. Thunder","description":"It looks like Mr. Thunder, the master weaponcrafter of Perion, could use some help. Maybe I should go check in on him.\nMr. Thunder, the master weaponcrafter of Perion, received an important request but is having trouble because he\u2019s short on materials. To help him, I\u2019ll need to defeat some Axe Stumps and craft 10 Screws.\nI was able to deliver the item Mr. Thunder asked for without any issues. At this rate, I might really be considered a fine apprentice.","rewards_exp":705,"rewards_money":0,"is_daily":false,"is_weekly":true,"is_repeatable":false},{"region":"Crafting","name":"Francois in Need of an Apprentice","level_min":10,"npc_name":"Francois","description":"It seems Francois, the tailor of Ellinia, is looking for someone worthy of becoming his apprentice.\nWhen I told Francois, the tailor of Ellinia, that I wanted to become his apprentice, he gave me a test. He said tailoring requires the right balance of skill and knowledge, and asked me to defeat monsters near Henesys and collect Leafs.\nI passed the test given by Francois, the tailor of Ellinia. Does this mean I can now become a proper tailor in Maple World","rewards_exp":171,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Crafting","name":"A Tailor in My Own Right!","level_min":25,"npc_name":"Francois","description":"It seems Francois, the tailor of Ellinia, is finally ready to acknowledge my tailoring skills.\nFrancois, the tailor of Ellinia, was impressed by how much I\u2019ve grown and suggested I show off my abilities. I need to defeat Wild Boars and craft a Red Starry Bandana to bring back.\nFrancois, the tailor of Ellinia, admired my craftsmanship and handed me a Equipment Crafting Stimulator. It seems to be a special item that can alter an equipment\u2019s stats when used during crafting. Maybe I should give it a try.","rewards_exp":2587,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Crafting","name":"Francois in Need of Help","level_min":15,"npc_name":"Francois","description":"It looks like Francois, the tailor of Ellinia, could use some help. Maybe I should stop by after a while.\nFrancois, the tailor of Ellinia, received an important request but is struggling due to a lack of materials. To help him out, I need to defeat Green Mushrooms and craft 10 Spool of Thread to bring back.\nI was able to safely deliver the item Francois asked for. At this point, I\u2019d say I\u2019ve proven myself to be a pretty solid apprentice.","rewards_exp":705,"rewards_money":0,"is_daily":false,"is_weekly":true,"is_repeatable":false},{"region":"Crafting","name":"Vicious in Need of an Apprentice","level_min":10,"npc_name":"Vicious","description":"It seems Vicious, the carpenter of Henesys, is looking for someone worthy of becoming his apprentice.\nWhen I told Vicious, the carpenter of Henesys, that I wanted to become his apprentice, he gave me a test. He said woodworking requires proper strength and knowledge, and asked me to defeat monsters near Henesys and collect Tree Branches.\nI passed the test given by Vicious, the carpenter of Henesys. Does this mean I can now become a proper carpenter in Maple World","rewards_exp":171,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Crafting","name":"A Carpenter in My Own Right!","level_min":25,"npc_name":"Vicious","description":"It seems Vicious, the carpenter of Henesys, is finally ready to acknowledge my woodworking skills.\nVicious, the carpenter of Henesys, was impressed by how much I\u2019ve grown and suggested I show off my abilities. I need to defeat Dark Axe Stumps and craft The Red Relaxer to bring back.\nVicious, the carpenter of Henesys, admired my craftsmanship and handed me a Equipment Crafting Stimulator. It seems to be a special item that can alter an equipment\u2019s stats when used during crafting. Maybe I should give it a try.","rewards_exp":2587,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Crafting","name":"Vicious in Need of Help","level_min":15,"npc_name":"Vicious","description":"It looks like Vicious, the carpenter of Henesys, could use some help. Maybe I should pay him a visit after a while.\nVicious, the carpenter of Henesys, received an important request but is struggling due to a lack of materials. To help him out, I need to defeat Axe Stumps and craft one Processed Wood.\nI was able to safely deliver the item Vicious asked for. At this point, I\u2019d say I\u2019ve proven myself to be a worthy apprentice.","rewards_exp":705,"rewards_money":0,"is_daily":false,"is_weekly":true,"is_repeatable":false},{"region":"Crafting","name":"JM From tha Streetz Looking for a Partner","level_min":10,"npc_name":"JM From tha Streetz","description":"The leatherworking master JM From tha Streetz of Kerning City seems to be looking for someone who could become a business partner.\nThe leatherworking master JM From tha Streetz of Kerning City gave me a test to see if I\u2019m worthy of becoming a partner. He said that proper strength and knowledge are required for leatherworking, and asked me to defeat monsters around Kerning City and Henesys to collect Leather.\nI passed the test given by the leatherworking master JM From tha Streetz of Kerning City. Could this mean that I, too, can stand proudly as a leatherworker in the Maple World","rewards_exp":171,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Crafting","name":"A Leatherworker in My Own Right!","level_min":25,"npc_name":"JM From tha Streetz","description":"It seems the leatherworking master JM From tha Streetz of Kerning City is finally ready to acknowledge my leatherworking skills.\nImpressed by my growth, the leatherworking master JM From tha Streetz of Kerning City suggested that I show what I\u2019m capable of. I must defeat Wild Boars and craft 1 Red Chair, then bring it back.\nAmazed by my craftsmanship, the leatherworking master JM From tha Streetz of Kerning City handed me a Equipment Crafting Stimulator. It seems to be a special item that can alter equipment stats when used during crafting. Should I try using it","rewards_exp":2587,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Crafting","name":"JM From tha Streetz in Need of Help","level_min":15,"npc_name":"JM From tha Streetz","description":"It looks like the leatherworking master JM From tha Streetz of Kerning City needs help again. It's been a while, perhaps I should pay him a visit.\nThe leatherworking master JM From tha Streetz of Kerning City has received an important request but is struggling due to a lack of materials. To help him, I\u2019ll need to defeat Jr. Neckis and gather Jr. Necki Skins.\nI was able to safely deliver the items requested by the leatherworking master JM From tha Streetz of Kerning City. At this point, wouldn\u2019t I qualify as a reliable partner","rewards_exp":705,"rewards_money":0,"is_daily":false,"is_weekly":true,"is_repeatable":false},{"region":"Crafting","name":"Chrishrama in Need of an Apprentice","level_min":10,"npc_name":"Chrishrama","description":"The Arcforger master Chrishrama of Sleepywood seems to be searching for someone who could become his apprentice.\nThe Arcforger master Chrishrama of Sleepywood gave me a test when I asked to become his apprentice. He said true Arcforgers must possess great wisdom, and instructed me to defeat monsters around Sleepywood and gather a Garnet Ore.\nI passed the test given by the Arcforger master Chrishrama of Sleepywood. Does this mean I can finally stand as a true Arcforger in Maple World","rewards_exp":171,"rewards_money":0,"is_daily":false,"is_weekly":false,"is_repeatable":false},{"region":"Crafting","name":"An Arcforger in My Own Right!","level_min":25,"npc_name":"Chrishrama","description":"It seems the Arcforger master Chrishrama of Sleepywood is finally ready to recognize my Arcforging skills.\nThe Arcforger master Chrishrama of Sleepywood was impressed with my growth an // ─── SORT DATA ───
DATA.bestiary.sort((a,b) => a.level - b.level);
DATA.equipment.sort((a,b) => (a.sub_category||'').localeCompare(b.sub_category||'') || a.reqLevel - b.reqLevel);
DATA.scrolls.sort((a,b) => (a.equip_slot||'').localeCompare(b.equip_slot||'') || tierOrder(a.tier) - tierOrder(b.tier));
DATA.npcs.sort((a,b) => a.name.localeCompare(b.name));
DATA.crafting.sort((a,b) => (a.discipline||'').localeCompare(b.discipline||'') || a.craft_level - b.craft_level);
DATA.cashshop.sort((a,b) => (a.category||'').localeCompare(b.category||'') || a.name.localeCompare(b.name));
DATA.items.sort((a,b) => (a.sub_category||'').localeCompare(b.sub_category||'') || a.name.localeCompare(b.name));
questsData.sort((a,b) => (a.region||'').localeCompare(b.region||'') || a.level_min - b.level_min);
skillsData.sort((a,b) => (a.class_name||'').localeCompare(b.class_name||'') || a.name.localeCompare(b.name));

function tierOrder(t) { return {'Lesser':0,'Intermediate':1,'Greater':2,'Chaos':3}[t] ?? 4; }

// ─── HELPERS ───
function fmt(n) { return n == null ? '—' : Number(n).toLocaleString(); }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function trunc(s, n) { if (!s) return ''; return s.length > n ? esc(s.slice(0,n)) + '…' : esc(s); }

// ─── PAGINATION ENGINE ───
const PER_PAGE = 10;
const pageState = { dynamic: 1, quests: 1, skills: 1 };
let activeTag = 'bestiary';

function renderTable(data, cfg, tbodyId, theadId, pagId, stateKey) {
  const page = pageState[stateKey];
  const total = data.length;
  const pages = Math.ceil(total / PER_PAGE);
  const start = (page - 1) * PER_PAGE;
  const slice = data.slice(start, start + PER_PAGE);

  // Header
  const thead = document.getElementById(theadId);
  thead.innerHTML = '<tr>' + cfg.headers.map((h, i) =>
    `<th class="${cfg.headerClasses[i] || ''}">${h}</th>`
  ).join('') + '</tr>';

  // Body
  document.getElementById(tbodyId).innerHTML = slice.map(cfg.row).join('');

  // Pagination
  const pag = document.getElementById(pagId);
  let html = `<span class="info">${fmt(total)} entries</span>`;
  html += `<button ${page<=1?'disabled':''} onclick="goPage('${stateKey}',${page-1})">&laquo; Prev</button>`;

  // Show page numbers with ellipsis
  const maxBtns = 7;
  let pStart = Math.max(1, page - 3);
  let pEnd = Math.min(pages, pStart + maxBtns - 1);
  if (pEnd - pStart < maxBtns - 1) pStart = Math.max(1, pEnd - maxBtns + 1);

  if (pStart > 1) { html += `<button onclick="goPage('${stateKey}',1)">1</button>`; if (pStart > 2) html += `<span style="color:var(--text-dim)">…</span>`; }
  for (let i = pStart; i <= pEnd; i++) {
    html += `<button class="${i===page?'active-page':''}" onclick="goPage('${stateKey}',${i})">${i}</button>`;
  }
  if (pEnd < pages) { if (pEnd < pages-1) html += `<span style="color:var(--text-dim)">…</span>`; html += `<button onclick="goPage('${stateKey}',${pages})">${pages}</button>`; }

  html += `<button ${page>=pages?'disabled':''} onclick="goPage('${stateKey}',${page+1})">Next &raquo;</button>`;
  pag.innerHTML = html;
}

function goPage(key, p) {
  pageState[key] = p;
  if (key === 'dynamic') renderDynamic();
  else if (key === 'quests') renderQuests();
  else if (key === 'skills') renderSkills();
}

// ─── DYNAMIC TABLE ───
function renderDynamic() {
  const cfg = TAG_CFG[activeTag];
  document.getElementById('dynamicTitle').textContent = cfg.title;
  renderTable(DATA[activeTag], cfg, 'dynamicBody', 'dynamicHead', 'dynamicPag', 'dynamic');
}

// ─── TAG SWITCHING ───
document.getElementById('tagBar').addEventListener('click', (e) => {
  const pill = e.target.closest('.tag-pill');
  if (!pill) return;
  document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  activeTag = pill.dataset.tag;
  pageState.dynamic = 1;
  renderDynamic();
});
